# Template consumed by scripts/seed-vault.sh. Mirrors the layout in design
# spec §9.5. Entries with empty `values:` are auto-generated as random
# passwords. Entries marked `generate: false` (externally minted credentials)
# must be written to Vault with `vault kv put` before seed-vault.sh runs.

secrets:
  - path: grafana/admin
    fields: [username, password]
    values: { username: admin, password: "" }

  - path: ceph/dashboard
    fields: [password]
    values: { password: "" }

  - path: postgres-cnpg/superuser
    fields: [username, password]
    values: { username: postgres, password: "" }

  - path: postgres-cnpg/airflow
    fields: [username, password]
    values: { username: airflow, password: "" }

  - path: postgres-cnpg/superset
    fields: [username, password]
    values: { username: superset, password: "" }

  - path: postgres-cnpg/hive
    fields: [username, password]
    values: { username: hive, password: "" }

  - path: postgres-cnpg/jupyterhub
    fields: [username, password]
    values: { username: jupyterhub, password: "" }

  - path: postgres-cnpg/grafana
    fields: [username, password]
    values: { username: grafana, password: "" }

  - path: postgres-cnpg/openwebui
    fields: [username, password]
    values: { username: openwebui, password: "" }

  - path: airflow/admin
    fields: [password]
    values: { password: "" }

  - path: airflow/api-secret
    fields: [api-secret-key]
    values: { api-secret-key: "" }

  - path: airflow/jwt-secret
    fields: [jwt-secret]
    values: { jwt-secret: "" }

  - path: airflow/fernet-key
    fields: [fernet-key]
    format: fernet
    values: { fernet-key: "" }

  - path: jupyter/admin
    fields: [password]
    values: { password: "" }

  - path: jupyter/proxy-auth
    fields: [auth-token, cookie-secret, cryptkeeper-keys]
    # Pinned so the jupyterhub chart's Helm-rendered auth_token/cookie_secret/
    # cryptkeeper keys (which rely on `lookup`, unavailable under Argo CD's
    # `helm template` rendering) can't drift between the hub and proxy pods.
    # hex format: JupyterHub.cookie_secret and CryptKeeper.keys must be
    # even-length hex strings; auth-token has no such requirement but shares
    # the format since all three fields live under one path.
    format: hex
    values: { auth-token: "", cookie-secret: "", cryptkeeper-keys: "" }

  - path: superset/admin
    fields: [password]
    values: { password: "" }

  - path: superset/secret
    fields: [secret-key]
    values: { secret-key: "" }

  - path: openwebui/admin
    fields: [password]
    values: { password: "" }

  - path: clickhouse/credentials
    fields: [username, password]
    values: { username: default, password: "" }

  - path: trino/credentials
    fields: [username, password]
    values: { username: admin, password: "" }

  - path: hive/metastore
    fields: [username, password]
    values: { username: hive, password: "" }

  - path: cassandra/admin
    fields: [password]
    values: { password: "" }

  - path: mysql/root
    fields: [password]
    values: { password: "" }

  - path: mysql/monitoring
    fields: [username, password]
    values: { username: monitoring, password: "" }

  - path: redis/default
    fields: [password]
    values: { password: "" }

  - path: harbor/llm-models
    fields: [username, password]
    # Harbor mints the robot account; the password cannot be regenerated locally.
    # Populate `values:` from the Harbor UI before seeding, otherwise seed-vault.sh
    # will refuse to write a placeholder for this entry.
    generate: false
    values: { username: "", password: "" }

  - path: huggingface/api-token
    fields: [token]
    # HuggingFace read token used by vllm and llama-cpp model-pull Jobs.
    # Required (homelab policy: never anonymous downloads). Mint at
    # https://huggingface.co/settings/tokens and write to Vault before seeding.
    generate: false
    values: { token: "" }

  - path: cloudflare/api-token
    fields: [api-token]
    # Cloudflare API token used by cert-manager's DNS-01 solver to issue the
    # Let's Encrypt wildcard for *.homelab.xiehang.com. Mint a scoped token in
    # the Cloudflare dashboard (Zone:DNS:Edit on xiehang.com) and write it
    # directly to Vault before seeding.
    generate: false
    values: { api-token: "" }
