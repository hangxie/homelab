---
- name: Verify API server certificates include the final kubectl endpoint
  hosts: masters
  become: true
  gather_facts: false
  vars:
    kube_api_vip_default: "192.168.0.218"
    kube_api_endpoint_host: "{{ kube_api_vip | default(kube_api_vip_default) }}"

  tasks:
    - name: Read API server certificate SANs
      command: openssl x509 -in /etc/kubernetes/pki/apiserver.crt -noout -ext subjectAltName
      register: apiserver_cert_sans
      changed_when: false

    - name: Assert API server certificate can serve final endpoint
      assert:
        that:
          - "('IP Address:' ~ kube_api_endpoint_host) in apiserver_cert_sans.stdout or ('DNS:' ~ kube_api_endpoint_host) in apiserver_cert_sans.stdout"
        fail_msg: "The kube-apiserver certificate on {{ inventory_hostname }} does not include {{ kube_api_endpoint_host }}. Reinitialize the cluster or renew apiserver certificates with this SAN before switching kubeconfig to the API VIP."

- name: Expose Kubernetes API through all masters for kubectl
  hosts: localhost
  gather_facts: false
  vars:
    kubeconfig: "/tmp/k8s-setup-latest/admin.conf"
    kube_api_vip_default: "192.168.0.218"
    kube_api_endpoint_host: "{{ kube_api_vip | default(kube_api_vip_default) }}"
    kube_api_endpoint: "https://{{ kube_api_endpoint_host }}:6443"

  tasks:
    - name: Create Kubernetes API LoadBalancer manifest
      copy:
        dest: /tmp/kube-api-lb.yaml
        mode: '0644'
        content: |
          apiVersion: cilium.io/v2
          kind: CiliumLoadBalancerIPPool
          metadata:
            name: kube-api-pool
          spec:
            blocks:
              - cidr: "{{ kube_api_endpoint_host }}/32"
            serviceSelector:
              matchLabels:
                home.lab/service: kube-api
          ---
          apiVersion: cilium.io/v2alpha1
          kind: CiliumL2AnnouncementPolicy
          metadata:
            name: kube-api-l2
          spec:
            loadBalancerIPs: true
            externalIPs: false
            interfaces:
              - "^(eth|ens|enp).*"
            serviceSelector:
              matchLabels:
                home.lab/service: kube-api
            nodeSelector:
              matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: kube-apiserver-lb
            namespace: kube-system
            labels:
              home.lab/service: kube-api
          spec:
            type: LoadBalancer
            loadBalancerIP: "{{ kube_api_endpoint_host }}"
            ports:
              - name: https
                protocol: TCP
                port: 6443
                targetPort: 6443
            selector:
              component: kube-apiserver
              tier: control-plane

    - name: Apply Kubernetes API LoadBalancer
      command: kubectl apply -f /tmp/kube-api-lb.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Wait for Kubernetes API LoadBalancer VIP
      command: kubectl -n kube-system get svc kube-apiserver-lb -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: kube_api_lb_ip
      changed_when: false
      retries: 30
      delay: 5
      until: kube_api_lb_ip.stdout == kube_api_endpoint_host

    - name: Verify Kubernetes API through LoadBalancer VIP
      command: kubectl --kubeconfig {{ kubeconfig }} --server={{ kube_api_endpoint }} get --raw=/readyz
      register: kube_api_vip_ready
      changed_when: false
      retries: 30
      delay: 5
      until:
        - kube_api_vip_ready.rc == 0
        - "'ok' in kube_api_vip_ready.stdout"

    - name: Point generated kubeconfig at Kubernetes API LoadBalancer VIP
      command: kubectl config set-cluster kubernetes --server={{ kube_api_endpoint }} --kubeconfig {{ kubeconfig }}

    - name: Create localhost kubeconfig directory
      file:
        path: "{{ lookup('env', 'HOME') }}/.kube"
        state: directory
        mode: '0700'

    - name: Copy final kubeconfig to localhost default kubectl config
      copy:
        src: "{{ kubeconfig }}"
        dest: "{{ lookup('env', 'HOME') }}/.kube/config"
        mode: '0600'

- name: Upload final kubeadm control plane endpoint
  hosts: masters[0]
  become: true
  gather_facts: false
  vars:
    pod_network_cidr: "10.10.0.0/16"
    service_network_cidr: "10.20.0.0/16"
    kube_api_vip_default: "192.168.0.218"
    kube_api_endpoint_host: "{{ kube_api_vip | default(kube_api_vip_default) }}"
    kube_api_control_plane_endpoint: "{{ kube_api_endpoint_host }}:6443"
    kube_api_cert_sans: "{{ ([kube_api_endpoint_host] + (groups['masters'] | map('extract', hostvars, 'ansible_host') | list) + groups['masters']) | unique }}"

  tasks:
    - name: Create final kubeadm config file
      copy:
        dest: /tmp/kubeadm-final-config.yaml
        mode: '0644'
        content: |
          apiVersion: kubeadm.k8s.io/v1beta3
          kind: ClusterConfiguration
          controlPlaneEndpoint: {{ kube_api_control_plane_endpoint }}
          apiServer:
            certSANs:
          {% for san in kube_api_cert_sans %}
              - "{{ san }}"
          {% endfor %}
          networking:
            podSubnet: {{ pod_network_cidr }}
            serviceSubnet: {{ service_network_cidr }}
          etcd:
            local:
              extraArgs:
                listen-metrics-urls: "http://0.0.0.0:2381"
          scheduler:
            extraArgs:
              bind-address: "0.0.0.0"
          controllerManager:
            extraArgs:
              bind-address: "0.0.0.0"

    - name: Upload final kubeadm config
      command: kubeadm init phase upload-config kubeadm --config=/tmp/kubeadm-final-config.yaml
      changed_when: false

    - name: Generate final worker join command
      command: kubeadm token create --print-join-command
      register: final_join_command
      changed_when: false

    - name: Upload certs and get final certificate key
      command: kubeadm init phase upload-certs --upload-certs
      register: final_cert_key_output
      changed_when: false

    - name: Save final worker join command to local file
      copy:
        content: "{{ final_join_command.stdout }}"
        dest: /tmp/k8s-setup-latest/join-command.sh
        mode: '0755'
      delegate_to: localhost
      become: false

    - name: Save final control plane join command to local file
      copy:
        content: "{{ final_join_command.stdout }} --control-plane --certificate-key {{ final_cert_key_output.stdout_lines[-1] }}"
        dest: /tmp/k8s-setup-latest/join-command-control-plane.sh
        mode: '0755'
      delegate_to: localhost
      become: false

- name: Distribute final kubeconfig to every node
  hosts: masters,workers
  become: true
  gather_facts: false
  vars:
    local_kubeconfig: "/tmp/k8s-setup-latest/admin.conf"
    kubeconfig_users:
      - name: root
        group: root
        home: /root
      - name: debian
        group: debian
        home: /home/debian

  tasks:
    - name: Copy final admin.conf to control-plane admin.conf
      copy:
        src: "{{ local_kubeconfig }}"
        dest: /etc/kubernetes/admin.conf
        owner: root
        group: root
        mode: '0600'
      when: inventory_hostname in groups['masters']

    - name: Create kubeconfig directories
      file:
        path: "{{ item.home }}/.kube"
        state: directory
        owner: "{{ item.name }}"
        group: "{{ item.group }}"
        mode: '0755'
      loop: "{{ kubeconfig_users }}"

    - name: Copy final kubeconfig to users
      copy:
        src: "{{ local_kubeconfig }}"
        dest: "{{ item.home }}/.kube/config"
        owner: "{{ item.name }}"
        group: "{{ item.group }}"
        mode: '0600'
      loop: "{{ kubeconfig_users }}"
