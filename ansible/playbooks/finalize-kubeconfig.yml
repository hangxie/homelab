---
- name: Verify API server certificates include the kube-API VIP
  hosts: masters
  become: true
  gather_facts: false
  vars:
    kube_api_vip_default: "192.168.0.218"
    kube_api_endpoint_host: "{{ kube_api_vip | default(kube_api_vip_default) }}"

  tasks:
    - name: Read API server certificate SANs
      command: openssl x509 -in /etc/kubernetes/pki/apiserver.crt -noout -ext subjectAltName
      register: apiserver_cert_sans
      changed_when: false

    - name: Assert API server certificate can serve final endpoint
      assert:
        that:
          - "('IP Address:' ~ kube_api_endpoint_host) in apiserver_cert_sans.stdout or ('DNS:' ~ kube_api_endpoint_host) in apiserver_cert_sans.stdout"
        fail_msg: "The kube-apiserver certificate on {{ inventory_hostname }} does not include {{ kube_api_endpoint_host }}. Reinitialize the cluster or renew apiserver certificates with this SAN."

- name: Stage the bootstrap kubeconfig on the Ansible control host
  hosts: localhost
  gather_facts: false
  vars:
    kubeconfig: "/tmp/k8s-setup-latest/admin.conf"

  tasks:
    - name: Create localhost kubeconfig directory
      file:
        path: "{{ lookup('env', 'HOME') }}/.kube"
        state: directory
        mode: '0700'

    - name: Copy kubeconfig to localhost default kubectl config
      copy:
        src: "{{ kubeconfig }}"
        dest: "{{ lookup('env', 'HOME') }}/.kube/config"
        mode: '0600'

- name: Distribute kubeconfig to every node
  hosts: masters,workers
  become: true
  gather_facts: false
  vars:
    local_kubeconfig: "/tmp/k8s-setup-latest/admin.conf"
    kubeconfig_users:
      - name: root
        group: root
        home: /root
      - name: debian
        group: debian
        home: /home/debian

  tasks:
    - name: Copy admin.conf to control-plane admin.conf
      copy:
        src: "{{ local_kubeconfig }}"
        dest: /etc/kubernetes/admin.conf
        owner: root
        group: root
        mode: '0600'
      when: inventory_hostname in groups['masters']

    - name: Create kubeconfig directories
      file:
        path: "{{ item.home }}/.kube"
        state: directory
        owner: "{{ item.name }}"
        group: "{{ item.group }}"
        mode: '0755'
      loop: "{{ kubeconfig_users }}"

    - name: Copy kubeconfig to users
      copy:
        src: "{{ local_kubeconfig }}"
        dest: "{{ item.home }}/.kube/config"
        owner: "{{ item.name }}"
        group: "{{ item.group }}"
        mode: '0600'
      loop: "{{ kubeconfig_users }}"
