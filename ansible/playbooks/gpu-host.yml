---
# OS-level NVIDIA host stack: driver, container toolkit, containerd runtime,
# the gpu=true:NoSchedule node taint. NFD and the NVIDIA device plugin are
# delegated to GitOps (waves 530 and 540).

- name: Detect GPU worker nodes
  hosts: workers
  become: true
  gather_facts: false

  tasks:
    - name: Install PCI utilities
      apt:
        name: pciutils
        state: present
        update_cache: yes

    - name: Detect NVIDIA GPUs via PCI scan
      shell: lspci | grep -qi nvidia
      register: nvidia_gpu_detect
      changed_when: false
      failed_when: false

    - name: Group workers by GPU presence
      group_by:
        key: "{{ 'gpu_workers_detected' if nvidia_gpu_detect.rc == 0 else 'non_gpu_workers_detected' }}"

- name: Install NVIDIA host stack on GPU workers
  hosts: gpu_workers_detected
  become: true
  gather_facts: false
  vars:
    nvidia_cuda_distro: debian13
    nvidia_cuda_repo_url: "https://developer.download.nvidia.com/compute/cuda/repos/{{ nvidia_cuda_distro }}/x86_64"
    nvidia_cuda_keyring_path: /usr/share/keyrings/nvidia-cuda-archive-keyring.gpg

  tasks:
    - name: Install GPU host prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Enable contrib/non-free components in Debian Deb822 sources
      replace:
        path: /etc/apt/sources.list.d/debian.sources
        regexp: '^Components: main$'
        replace: 'Components: main contrib non-free non-free-firmware'

    - name: Add NVIDIA container toolkit GPG key
      shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit.gpg
      args:
        creates: /usr/share/keyrings/nvidia-container-toolkit.gpg

    - name: Add NVIDIA container toolkit repo
      shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
          | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit.gpg] https://#g' \
          > /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    - name: Add NVIDIA CUDA apt GPG key
      shell: |
        curl -fsSL {{ nvidia_cuda_repo_url }}/8793F200.pub | gpg --dearmor -o {{ nvidia_cuda_keyring_path }}
      args:
        creates: "{{ nvidia_cuda_keyring_path }}"

    - name: Add NVIDIA CUDA apt repository
      copy:
        dest: /etc/apt/sources.list.d/nvidia-cuda.list
        mode: '0644'
        content: |
          deb [signed-by={{ nvidia_cuda_keyring_path }}] {{ nvidia_cuda_repo_url }} /

    - name: Install NVIDIA container toolkit
      apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: yes

    - name: Check if NVIDIA kernel module is installed
      command: modprobe --dry-run nvidia
      register: nvidia_modprobe_pre
      changed_when: false
      failed_when: false

    - name: Get running kernel version
      command: uname -r
      register: kernel_version
      changed_when: false

    - name: Install NVIDIA driver from CUDA repo
      apt:
        name:
          - nvidia-driver-cuda
          - nvidia-kernel-open-dkms
          - "linux-headers-{{ kernel_version.stdout }}"
          - dkms
          - nvtop
        state: present
        update_cache: yes
      register: nvidia_driver_packages
      when: nvidia_modprobe_pre.rc != 0

    - name: Reboot GPU workers after driver install
      reboot:
      when: nvidia_driver_packages is changed

    - name: Verify NVIDIA kernel module loads after reboot
      command: modprobe nvidia
      when: nvidia_driver_packages is changed

    - name: Dump effective containerd config before NVIDIA runtime configuration
      command: containerd config dump
      register: containerd_config_dump_before_nvidia
      changed_when: false

    - name: Detect whether NVIDIA runtime is already the containerd default
      set_fact:
        nvidia_containerd_runtime_configured: >-
          {{
            'default_runtime_name = "nvidia"' in containerd_config_dump_before_nvidia.stdout
            and (
              'nvidia-container-runtime' in containerd_config_dump_before_nvidia.stdout
              or 'runtimes.nvidia' in containerd_config_dump_before_nvidia.stdout
            )
          }}
      changed_when: false

    - name: Configure NVIDIA runtime for containerd
      command: nvidia-ctk runtime configure --runtime=containerd --set-as-default
      when: not (nvidia_containerd_runtime_configured | bool)
      notify: Restart containerd

    - name: Dump effective containerd config
      command: containerd config dump
      register: containerd_config_dump
      changed_when: false

    - name: Verify NVIDIA runtime is present in effective containerd config
      assert:
        that:
          - >
            'default_runtime_name = "nvidia"' in containerd_config_dump.stdout
            or 'nvidia-container-runtime' in containerd_config_dump.stdout
            or '.runtimes.nvidia' in containerd_config_dump.stdout
        fail_msg: NVIDIA runtime not found in effective containerd config

  handlers:
    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted

- name: Taint GPU nodes
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Apply gpu=true:NoSchedule taint to GPU nodes
      shell: |
        current_taints=$(kubectl get node {{ item }} -o jsonpath='{range .spec.taints[?(@.key=="gpu")]}{.key}={.value}:{.effect}{"\n"}{end}')
        if printf '%s\n' "$current_taints" | grep -qx 'gpu=true:NoSchedule'; then
          echo unchanged
        else
          kubectl taint nodes {{ item }} gpu=true:NoSchedule --overwrite
        fi
      loop: "{{ groups['gpu_workers_detected'] | default([]) }}"
      environment:
        KUBECONFIG: "{{ bootstrap_kubeconfig }}"
      register: gpu_taint_apply
      changed_when: "' tainted' in gpu_taint_apply.stdout or ' modified' in gpu_taint_apply.stdout"
      when: (groups['gpu_workers_detected'] | default([]) | length) > 0
