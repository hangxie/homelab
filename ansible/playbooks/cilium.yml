---
- name: Install Cilium CNI
  hosts: localhost
  gather_facts: false
  vars:
    cilium_version: "1.19.4"
    gateway_api_version: "v1.5.1"
    pod_network_cidr: "10.10.0.0/16"
    kubeconfig: "/tmp/k8s-setup-latest/admin.conf"
    kube_api_vip_default: "192.168.0.218"
    control_plane_host: "{{ kube_api_vip | default(kube_api_vip_default) }}"

  tasks:
    - name: Wait for Kubernetes API server to be ready
      command: kubectl get --raw=/readyz
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: apiserver_ready
      changed_when: false
      retries: 30
      delay: 10
      until:
        - apiserver_ready.rc == 0
        - "'ok' in apiserver_ready.stdout"

    - name: Check if Gateway API CRDs are installed
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: gateways.gateway.networking.k8s.io
      register: gateway_crd_check

    - name: Install Gateway API CRDs (standard channel)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        apply: true
        src: "https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ gateway_api_version }}/standard-install.yaml"
      when: gateway_crd_check.resources | length == 0

    - name: Wait for Gateway API CRDs to be established
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: "{{ item }}"
        wait: true
        wait_condition:
          type: Established
          status: "True"
        wait_timeout: 120
      loop:
        - gateways.gateway.networking.k8s.io
        - httproutes.gateway.networking.k8s.io
        - gatewayclasses.gateway.networking.k8s.io
        - referencegrants.gateway.networking.k8s.io
        - tlsroutes.gateway.networking.k8s.io

    # Cilium 1.19.x looks up TLSRoute at v1alpha2. Gateway API >= v1.3 promotes
    # TLSRoute to v1 and stops serving v1alpha2, which crashes the operator.
    # This patch re-enables v1alpha2 serving idempotently.
    - name: Read TLSRoute CRD versions
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: tlsroutes.gateway.networking.k8s.io
      register: tlsroute_crd

    - name: Locate TLSRoute v1alpha2 CRD version
      set_fact:
        tlsroute_v1alpha2_index: "{{ ansible_loop.index0 }}"
        tlsroute_v1alpha2_served: "{{ item.served | default(false) | bool }}"
      loop: "{{ tlsroute_crd.resources[0].spec.versions }}"
      loop_control:
        extended: true
        label: "{{ item.name }}"
      when: item.name == "v1alpha2"

    - name: Ensure TLSRoute v1alpha2 is served for Cilium operator compatibility
      kubernetes.core.k8s_json_patch:
        kubeconfig: "{{ kubeconfig }}"
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: tlsroutes.gateway.networking.k8s.io
        patch:
          - op: replace
            path: "/spec/versions/{{ tlsroute_v1alpha2_index }}/served"
            value: true
      when:
        - tlsroute_v1alpha2_index is defined
        - not (tlsroute_v1alpha2_served | bool)

    - name: Ensure Cilium helm repo is present
      kubernetes.core.helm_repository:
        kubeconfig: "{{ kubeconfig }}"
        repo_name: cilium
        repo_url: https://helm.cilium.io/

    - name: Check whether Cilium release is already installed
      command: helm list -n kube-system -q
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: cilium_release_check
      changed_when: false
      failed_when: false

    # Bootstrap install: shared values from files/cilium-base-values.yaml
    # plus only the bootstrap-specific overrides. Hubble UI/relay, SPIRE,
    # ServiceMonitors, dashboards, and operator.replicas=2 all require
    # services that don't exist yet (workers, rook-ceph, prometheus,
    # cert-manager) - those are layered on later by cilium-post-bootstrap.yml.
    - name: Install Cilium bootstrap CNI (only on first run)
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        chart_ref: cilium/cilium
        release_name: cilium
        release_namespace: kube-system
        chart_version: "{{ cilium_version }}"
        values_files:
          - "{{ playbook_dir }}/files/cilium-base-values.yaml"
        values:
          k8sServiceHost: "{{ control_plane_host }}"
          # Only master-0 is schedulable at this point, so cap operator
          # replicas at 1 to keep `wait: true` from timing out on a
          # pending second pod. Bumped to 2 in cilium-post-bootstrap.yml.
          operator:
            replicas: 1
        wait: true
        timeout: 600s
      when: "'cilium' not in (cilium_release_check.stdout_lines | default([]))"

    - name: Wait for Cilium agent pods to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: Pod
        namespace: kube-system
        label_selectors:
          - k8s-app=cilium
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300
      retries: 3
      delay: 30
      register: cilium_ready
      until: cilium_ready.resources | length > 0

    - name: Wait for Cilium operator to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: Pod
        namespace: kube-system
        label_selectors:
          - io.cilium/app=operator
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300

    - name: Verify Cilium GatewayClass is accepted
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: gateway.networking.k8s.io/v1
        kind: GatewayClass
        name: cilium
        wait: true
        wait_condition:
          type: Accepted
          status: "True"
        wait_timeout: 120
      retries: 5
      delay: 10
      register: gwc_ready
      until: gwc_ready.resources | length > 0

    - name: Capture Cilium agent pod status
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: Pod
        namespace: kube-system
        label_selectors:
          - k8s-app=cilium
      register: cilium_agent_pods

    - name: Capture Cilium operator pod status
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: Pod
        namespace: kube-system
        label_selectors:
          - io.cilium/app=operator
      register: cilium_operator_pods

    - name: Show Cilium status
      debug:
        msg:
          - "Cilium agent pods: {{ cilium_agent_pods.resources | map(attribute='metadata.name') | list }}"
          - "Cilium operator pods: {{ cilium_operator_pods.resources | map(attribute='metadata.name') | list }}"
          - "GatewayClass cilium accepted"
