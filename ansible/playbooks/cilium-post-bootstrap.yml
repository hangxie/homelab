---
# Post-bootstrap Cilium configuration. Upgrades Cilium with SPIRE, Hubble, and
# dashboards, then re-enables root app automated sync (disabled during bootstrap
# to avoid etcd fan-out). Grafana namespace is pre-created here so the Cilium
# helm upgrade can place dashboard ConfigMaps without triggering a full wave-40+
# reconciliation burst before the upgrade completes.

- name: Enable Cilium post-bootstrap features and observability
  hosts: localhost
  gather_facts: false
  vars:
    cilium_version: "1.19.4"
    kubeconfig: "/tmp/k8s-setup-latest/admin.conf"
    kube_api_vip_default: "192.168.0.218"
    kube_api_endpoint_host: "{{ kube_api_vip | default(kube_api_vip_default) }}"
    kube_api_endpoint: "https://{{ kube_api_endpoint_host }}:6443"

  tasks:
    - name: Verify Kubernetes API through LoadBalancer VIP
      command: kubectl --kubeconfig {{ kubeconfig }} --server={{ kube_api_endpoint }} get --raw=/readyz
      register: kube_api_vip_ready
      changed_when: false
      retries: 30
      delay: 5
      until:
        - kube_api_vip_ready.rc == 0
        - "'ok' in kube_api_vip_ready.stdout"

    - name: Pre-create grafana namespace for Cilium dashboard ConfigMaps
      # Cilium helm places dashboard ConfigMaps in the grafana namespace. Creating
      # it here avoids re-enabling root app sync (which would fan-out all wave-40+
      # apps simultaneously) just to get the namespace. Grafana itself deploys into
      # this pre-existing namespace after root sync is re-enabled post-upgrade.
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: grafana

    - name: List ExternalSecrets before waiting for Cilium's platform prerequisites
      # SPIRE's PVC requires rook-ceph storage to be available. The rook-ceph
      # StorageClass appears before the Ceph cluster can bind a volume, so gate on
      # CephCluster Ready to avoid the helm wait expiring while spire-server is
      # Pending on its PVC. ESO occasionally leaves an ExternalSecret Ready=False
      # after a startup race even though the Secret was created correctly, so nudge
      # those to unblock resources gated on them.
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: external-secrets.io/v1
        kind: ExternalSecret
      register: external_secret_list

    - name: Nudge stale ExternalSecrets
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: patched
        api_version: external-secrets.io/v1
        kind: ExternalSecret
        namespace: "{{ item.metadata.namespace }}"
        name: "{{ item.metadata.name }}"
        merge_type: merge
        definition:
          metadata:
            annotations:
              force-sync: "{{ external_secret_force_sync }}"
      vars:
        external_secret_force_sync: "{{ lookup('pipe', 'date +%s') }}"
      loop: "{{ external_secret_list.resources }}"
      loop_control:
        label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
      when: >-
        item.status.conditions | default([])
        | selectattr('type', 'equalto', 'Ready')
        | selectattr('status', 'equalto', 'False')
        | list
        | length > 0

    - name: Wait for rook-ceph block StorageClass
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: storage.k8s.io/v1
        kind: StorageClass
        name: rook-ceph-block
      register: rook_ceph_block_storageclass
      retries: 60
      delay: 30
      until: rook_ceph_block_storageclass.resources | length > 0

    - name: Wait for CephCluster to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: ceph.rook.io/v1
        kind: CephCluster
        namespace: rook-ceph
        name: rook-ceph
      register: ceph_cluster
      retries: 60
      delay: 30
      until: >-
        ceph_cluster.resources | length > 0
        and (ceph_cluster.resources[0].status.phase | default('')) == 'Ready'

    - name: Capture Cilium config before post-bootstrap upgrade
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: ConfigMap
        namespace: kube-system
        name: cilium-config
      register: cilium_config_before

    - name: Helm upgrade Cilium with post-bootstrap features
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        chart_ref: cilium/cilium
        release_name: cilium
        release_namespace: kube-system
        chart_version: "{{ cilium_version }}"
        reuse_values: true
        values_files:
          - "{{ playbook_dir }}/files/cilium-base-values.yaml"
        values:
          k8sServiceHost: "{{ kube_api_endpoint_host }}"
          authentication:
            enabled: true
            mutual:
              spire:
                enabled: true
                install:
                  enabled: true
                  server:
                    dataStorage:
                      storageClass: rook-ceph-block
          prometheus:
            serviceMonitor:
              enabled: false
          operator:
            replicas: 2
            prometheus:
              enabled: true
              serviceMonitor:
                enabled: false
            dashboards:
              enabled: true
              namespace: grafana
              annotations:
                k8s-sidecar-target-directory: /tmp/dashboards/Networking
          hubble:
            enabled: true
            relay:
              enabled: true
              replicas: 2
            ui:
              enabled: true
              replicas: 2
            metrics:
              enableOpenMetrics: true
              enabled:
                - dns
                - drop
                - tcp
                - flow
                - port-distribution
                - icmp
                - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"
              serviceMonitor:
                enabled: false
              dashboards:
                enabled: true
                namespace: grafana
                annotations:
                  k8s-sidecar-target-directory: /tmp/dashboards/Networking
          dashboards:
            enabled: true
            namespace: grafana
            annotations:
              k8s-sidecar-target-directory: /tmp/dashboards/Networking
        wait: true
        timeout: 600s
      register: cilium_post_bootstrap_helm

    - name: Capture Cilium config after post-bootstrap upgrade
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: ConfigMap
        namespace: kube-system
        name: cilium-config
      register: cilium_config_after

    - name: Restart Cilium agents to pick up cilium-config changes
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: patched
        api_version: apps/v1
        kind: "{{ item.kind }}"
        namespace: kube-system
        name: "{{ item.name }}"
        definition:
          spec:
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/restartedAt: "{{ cilium_restart_timestamp }}"
      vars:
        cilium_restart_timestamp: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"
      loop:
        - kind: DaemonSet
          name: cilium
        - kind: Deployment
          name: cilium-operator
      when: >
        (cilium_config_before.resources[0].data | default({}))
        != (cilium_config_after.resources[0].data | default({}))

    - name: Wait for Cilium agent rollout
      command: kubectl -n kube-system rollout status daemonset/cilium --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 10
      delay: 30
      register: cilium_agent_rollout
      changed_when: false
      until: cilium_agent_rollout.rc == 0

    - name: Wait for Cilium operator rollout
      command: kubectl -n kube-system rollout status deployment/cilium-operator --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 3
      delay: 30
      register: cilium_operator_rollout
      changed_when: false
      until: cilium_operator_rollout.rc == 0

    - name: Wait for SPIRE server to be ready
      command: kubectl -n cilium-spire rollout status statefulset/spire-server --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 3
      delay: 30
      register: spire_server_ready
      changed_when: false
      until: spire_server_ready.rc == 0

    - name: Wait for SPIRE agents to be ready
      command: kubectl -n cilium-spire rollout status daemonset/spire-agent --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 3
      delay: 30
      register: spire_agent_ready
      changed_when: false
      until: spire_agent_ready.rc == 0

    - name: Wait for Hubble Relay to be ready
      command: kubectl -n kube-system rollout status deployment/hubble-relay --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 3
      delay: 30
      register: hubble_relay_ready
      changed_when: false
      until: hubble_relay_ready.rc == 0

    - name: Wait for Hubble UI to be ready
      command: kubectl -n kube-system rollout status deployment/hubble-ui --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 3
      delay: 30
      register: hubble_ui_ready
      changed_when: false
      until: hubble_ui_ready.rc == 0

    - name: Re-enable root app automated sync
      # Cilium, SPIRE, and Hubble are all healthy at this point. Re-enabling now
      # lets Argo CD fan-out waves 40+ without racing the helm upgrade.
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        apply: true
        src: "{{ repo_root }}/gitops/cluster/root-app.yaml"
      vars:
        repo_root: "{{ playbook_dir }}/../.."

    - name: Apply Hubble UI HTTPRoute
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: hubble
            namespace: kube-system
          spec:
            parentRefs:
              - name: default-gateway
                namespace: gateway-system
            hostnames:
              - "hubble.homelab.xiehang.com"
            rules:
              - backendRefs:
                  - name: hubble-ui
                    port: 80

    - name: Verify dashboard ConfigMaps are present
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: ConfigMap
        namespace: grafana
        label_selectors:
          - grafana_dashboard=1
      register: dash_list

    - name: Show monitoring summary
      debug:
        msg:
          - "Grafana dashboard ConfigMaps:"
          - "{{ dash_list.resources | map(attribute='metadata.name') | list }}"
