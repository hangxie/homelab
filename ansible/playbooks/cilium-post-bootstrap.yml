---
# Post-bootstrap Cilium configuration. The first Cilium install deliberately
# omits features that depend on platform services Argo CD only reconciles after
# the root app is applied: rook-ceph storage (SPIRE's PVC), the grafana namespace
# (dashboards), and the default gateway (Hubble route). This play waits for those
# specific resources itself rather than relying on a global platform-convergence
# gate during bootstrap.

- name: Enable Cilium post-bootstrap features and observability
  hosts: localhost
  gather_facts: false
  vars:
    cilium_version: "1.19.4"
    kubeconfig: "/tmp/k8s-setup-latest/admin.conf"
    kube_api_vip_default: "192.168.0.218"
    kube_api_endpoint_host: "{{ kube_api_vip | default(kube_api_vip_default) }}"
    kube_api_endpoint: "https://{{ kube_api_endpoint_host }}:6443"

  tasks:
    - name: Verify Kubernetes API through LoadBalancer VIP
      command: kubectl --kubeconfig {{ kubeconfig }} --server={{ kube_api_endpoint }} get --raw=/readyz
      register: kube_api_vip_ready
      changed_when: false
      retries: 30
      delay: 5
      until:
        - kube_api_vip_ready.rc == 0
        - "'ok' in kube_api_vip_ready.stdout"

    - name: Nudge stale ExternalSecrets and wait for Cilium's platform prerequisites
      # Argo CD reconciles platform Applications asynchronously after the root app
      # is applied, so this is the scoped replacement for the old global gate. The
      # helm upgrade below is atomic (wait: true) and fails outright if these are
      # missing: SPIRE's PVC needs the rook-ceph-block StorageClass, and the Cilium
      # dashboards are created in the grafana namespace. (The Hubble route applied
      # later needs no gate — it attaches to the gateway whenever it appears.)
      # ESO occasionally leaves an ExternalSecret Ready=False after a startup race
      # even though the Secret was created correctly, so nudge those each retry to
      # unblock resources gated on them.
      shell: |
        set -o pipefail
        kubectl get externalsecret -A \
          -o jsonpath='{range .items[*]}{.metadata.namespace}|{.metadata.name}|{.status.conditions[0].type}|{.status.conditions[0].status}{"\n"}{end}' \
        | awk -F'|' '$3=="Ready" && $4=="False" {print $1, $2}' \
        | while read -r ns name; do
            [[ -n "$ns" && -n "$name" ]] || continue
            kubectl -n "$ns" annotate externalsecret "$name" "force-sync=$(date +%s)" --overwrite >/dev/null
          done
        kubectl get storageclass rook-ceph-block >/dev/null 2>&1 || exit 1
        kubectl get namespace grafana >/dev/null 2>&1
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: platform_prereqs
      retries: 60
      delay: 30
      until: platform_prereqs.rc == 0
      changed_when: false

    - name: Capture Cilium config before post-bootstrap upgrade
      command: kubectl -n kube-system get configmap cilium-config -o json
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: cilium_config_before
      changed_when: false

    - name: Helm upgrade Cilium with post-bootstrap features
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        chart_ref: cilium/cilium
        release_name: cilium
        release_namespace: kube-system
        chart_version: "{{ cilium_version }}"
        reuse_values: true
        values_files:
          - "{{ playbook_dir }}/files/cilium-base-values.yaml"
        values:
          k8sServiceHost: "{{ kube_api_endpoint_host }}"
          authentication:
            enabled: true
            mutual:
              spire:
                enabled: true
                install:
                  enabled: true
                  server:
                    dataStorage:
                      storageClass: rook-ceph-block
          prometheus:
            serviceMonitor:
              enabled: false
          operator:
            replicas: 2
            prometheus:
              enabled: true
              serviceMonitor:
                enabled: false
            dashboards:
              enabled: true
              namespace: grafana
          hubble:
            enabled: true
            relay:
              enabled: true
              replicas: 2
            ui:
              enabled: true
              replicas: 2
            metrics:
              enableOpenMetrics: true
              enabled:
                - dns
                - drop
                - tcp
                - flow
                - port-distribution
                - icmp
                - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"
              serviceMonitor:
                enabled: false
              dashboards:
                enabled: true
                namespace: grafana
          dashboards:
            enabled: true
            namespace: grafana
        wait: true
        timeout: 600s
      register: cilium_post_bootstrap_helm

    - name: Capture Cilium config after post-bootstrap upgrade
      command: kubectl -n kube-system get configmap cilium-config -o json
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: cilium_config_after
      changed_when: false

    - name: Restart Cilium agents to pick up cilium-config changes
      command: kubectl -n kube-system rollout restart daemonset/cilium deployment/cilium-operator
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      when: >
        (cilium_config_before.stdout | from_json).data
        != (cilium_config_after.stdout | from_json).data

    - name: Wait for Cilium agent rollout
      command: kubectl -n kube-system rollout status daemonset/cilium --timeout=600s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false

    - name: Wait for Cilium operator rollout
      command: kubectl -n kube-system rollout status deployment/cilium-operator --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false

    - name: Wait for SPIRE server to be ready
      command: kubectl -n cilium-spire rollout status statefulset/spire-server --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 3
      delay: 30
      register: spire_server_ready
      changed_when: false
      until: spire_server_ready.rc == 0

    - name: Wait for SPIRE agents to be ready
      command: kubectl -n cilium-spire rollout status daemonset/spire-agent --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 3
      delay: 30
      register: spire_agent_ready
      changed_when: false
      until: spire_agent_ready.rc == 0

    - name: Wait for Hubble Relay to be ready
      command: kubectl -n kube-system rollout status deployment/hubble-relay --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 3
      delay: 30
      register: hubble_relay_ready
      changed_when: false
      until: hubble_relay_ready.rc == 0

    - name: Wait for Hubble UI to be ready
      command: kubectl -n kube-system rollout status deployment/hubble-ui --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 3
      delay: 30
      register: hubble_ui_ready
      changed_when: false
      until: hubble_ui_ready.rc == 0

    - name: Apply Hubble UI HTTPRoute
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: hubble
            namespace: kube-system
          spec:
            parentRefs:
              - name: default-gateway
                namespace: gateway-system
            hostnames:
              - "hubble.homelab.xiehang.com"
            rules:
              - backendRefs:
                  - name: hubble-ui
                    port: 80

    - name: Verify dashboard ConfigMaps are present
      command: >
        kubectl -n grafana get configmap -l grafana_dashboard=1
        -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: dash_list
      changed_when: false

    - name: Show monitoring summary
      debug:
        msg:
          - "Grafana dashboard ConfigMaps:"
          - "{{ dash_list.stdout_lines }}"
