---
# Bootstrap root in sync-disabled mode to avoid reconciliation fan-out that
# overloads etcd on a cold cluster. Waves 10–32 are sequenced manually here;
# cilium-post-bootstrap re-applies root-app.yaml to restore automated sync.

- name: Apply root Application and sequence essential platform bootstrap
  hosts: localhost
  gather_facts: false
  vars:
    repo_root: "{{ playbook_dir }}/../.."
    apps: "{{ repo_root }}/gitops/cluster/applications"

  tasks:
    - name: Apply root Application (sync disabled — bootstrap phase)
      kubernetes.core.k8s:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        state: present
        apply: true
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: root
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/hangxie/homelab.git
              targetRevision: main
              path: gitops/cluster/applications
              directory:
                recurse: false
            destination:
              server: https://kubernetes.default.svc
              namespace: argocd

    - name: Apply wave 100 — cert-manager
      kubernetes.core.k8s:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        state: present
        apply: true
        src: "{{ apps }}/cert-manager.yaml"

    - name: Wait for cert-manager — Synced and Healthy
      kubernetes.core.k8s_info:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: argocd
        name: cert-manager
      register: _wait
      until: >-
        _wait.resources | length > 0
        and (_wait.resources[0].status.sync.status | default('')) == 'Synced'
        and (_wait.resources[0].status.health.status | default('')) == 'Healthy'
      retries: 40
      delay: 15

    - name: Apply wave 110 — external-secrets
      kubernetes.core.k8s:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        state: present
        apply: true
        src: "{{ apps }}/external-secrets.yaml"

    - name: Wait for external-secrets — Synced and Healthy
      kubernetes.core.k8s_info:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: argocd
        name: external-secrets
      register: _wait
      until: >-
        _wait.resources | length > 0
        and (_wait.resources[0].status.sync.status | default('')) == 'Synced'
        and (_wait.resources[0].status.health.status | default('')) == 'Healthy'
      retries: 40
      delay: 15

    - name: Wait for external-secrets webhook deployment to be fully ready
      command: kubectl -n external-secrets rollout status deployment/external-secrets-webhook --timeout=120s
      environment:
        KUBECONFIG: "{{ bootstrap_kubeconfig }}"
      register: _wait
      until: _wait.rc == 0
      retries: 10
      delay: 15
      changed_when: false

    - name: Apply wave 120 — external-secrets-stores
      kubernetes.core.k8s:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        state: present
        apply: true
        src: "{{ apps }}/external-secrets-stores.yaml"

    - name: Wait for external-secrets-stores — Synced and Healthy
      kubernetes.core.k8s_info:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: argocd
        name: external-secrets-stores
      register: _wait
      until: >-
        _wait.resources | length > 0
        and (_wait.resources[0].status.sync.status | default('')) == 'Synced'
        and (_wait.resources[0].status.health.status | default('')) == 'Healthy'
      retries: 20
      delay: 15

    - name: Apply wave 130 — cert-manager-config
      kubernetes.core.k8s:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        state: present
        apply: true
        src: "{{ apps }}/cert-manager-config.yaml"

    - name: Wait for cert-manager-config — Synced and Healthy
      kubernetes.core.k8s_info:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: argocd
        name: cert-manager-config
      register: _wait
      until: >-
        _wait.resources | length > 0
        and (_wait.resources[0].status.sync.status | default('')) == 'Synced'
        and (_wait.resources[0].status.health.status | default('')) == 'Healthy'
      retries: 20
      delay: 15

    - name: Apply wave 200 — rook-ceph
      kubernetes.core.k8s:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        state: present
        apply: true
        src: "{{ apps }}/rook-ceph.yaml"

    - name: Wait for rook-ceph — Synced and Healthy
      kubernetes.core.k8s_info:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: argocd
        name: rook-ceph
      register: _wait
      until: >-
        _wait.resources | length > 0
        and (_wait.resources[0].status.sync.status | default('')) == 'Synced'
        and (_wait.resources[0].status.health.status | default('')) == 'Healthy'
      retries: 40
      delay: 15

    - name: Apply wave 210 — ceph-csi-drivers
      kubernetes.core.k8s:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        state: present
        apply: true
        src: "{{ apps }}/ceph-csi-drivers.yaml"

    - name: Wait for ceph-csi-drivers — Synced and Healthy
      kubernetes.core.k8s_info:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: argocd
        name: ceph-csi-drivers
      register: _wait
      until: >-
        _wait.resources | length > 0
        and (_wait.resources[0].status.sync.status | default('')) == 'Synced'
        and (_wait.resources[0].status.health.status | default('')) == 'Healthy'
      retries: 20
      delay: 15

    - name: Apply wave 220 — rook-ceph-cluster
      kubernetes.core.k8s:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        state: present
        apply: true
        src: "{{ apps }}/rook-ceph-cluster.yaml"

    - name: Wait for rook-ceph-cluster — Synced
      # CephCluster readiness is gated separately in cilium-post-bootstrap.
      kubernetes.core.k8s_info:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: argocd
        name: rook-ceph-cluster
      register: _wait
      until: >-
        _wait.resources | length > 0
        and (_wait.resources[0].status.sync.status | default('')) == 'Synced'
      retries: 20
      delay: 15

    - name: Essential platform waves applied
      debug:
        msg:
          - "Waves 10–32 (cert-manager → external-secrets → cert-manager-config → rook-ceph-cluster) applied and synced."
          - "Root app remains sync-disabled; cilium-post-bootstrap re-enables it"
          - "once CephCluster is Ready and remaining platform gates pass."
