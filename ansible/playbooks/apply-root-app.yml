---
# Apply gitops/cluster/root-app.yaml and hand reconciliation to Argo CD, which
# converges root, platform, and workload Applications on its own (ordered by
# sync-waves). Bootstrap intentionally does NOT block on platform convergence
# here: the only post-apply step that needs specific platform resources is
# cilium-post-bootstrap, which waits for exactly those resources itself.

- name: Apply root Application
  hosts: localhost
  gather_facts: false
  vars:
    repo_root: "{{ playbook_dir }}/../.."

  tasks:
    - name: Apply root Application
      command: kubectl apply -f {{ repo_root }}/gitops/cluster/root-app.yaml
      environment:
        KUBECONFIG: "{{ bootstrap_kubeconfig }}"

    - name: Root Application applied
      debug:
        msg:
          - "Root Application applied; Argo CD now owns reconciliation."
          - "cilium-post-bootstrap waits for the platform resources Cilium needs."
