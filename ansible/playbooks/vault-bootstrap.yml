---
# Phase 6: seed the vault-approle Secret in the external-secrets namespace
# so the ClusterSecretStore can authenticate. Spec §6.2 item 9 + §9.3.
#
# Pre-requisites on the operator workstation:
#   - vault CLI installed
#   - vault_addr configured and the vault CLI authenticated, with permissions to read
#     auth/approle/role/homelab/role-id and write
#     auth/approle/role/homelab/secret-id
#   - scripts/seed-vault.sh already run against the target Vault

- name: Bootstrap Vault credentials into Kubernetes
  hosts: localhost
  gather_facts: false
  vars:
    vault_effective_addr: "{{ vault_addr | default(lookup('env', 'VAULT_ADDR'), true) }}"
    vault_rotate_approle_secret: false
    vault_cli_environment:
      VAULT_ADDR: "{{ vault_effective_addr }}"

  tasks:
    - name: Ensure Vault address is configured
      assert:
        that: vault_effective_addr | length > 0
        fail_msg: "Set vault_addr or export VAULT_ADDR before running vault-bootstrap.yml."

    - name: Verify Vault token is usable
      command: vault token lookup
      register: vault_token_lookup
      changed_when: false
      failed_when: false
      environment: "{{ vault_cli_environment }}"
      no_log: true

    - name: Ensure vault CLI is authenticated
      assert:
        that: vault_token_lookup.rc == 0
        fail_msg: "Authenticate the vault CLI for {{ vault_effective_addr }} before running vault-bootstrap.yml: export VAULT_TOKEN or run vault login."

    - name: Check Vault AppRole role exists
      command: vault read -field=role_id auth/approle/role/homelab/role-id
      register: vault_approle_role_id_check
      changed_when: false
      failed_when: false
      environment: "{{ vault_cli_environment }}"
      no_log: true

    - name: Ensure Vault AppRole role is seeded
      assert:
        that:
          - vault_approle_role_id_check.rc == 0
          - vault_approle_role_id_check.stdout | trim | length > 0
        fail_msg: >-
          Vault AppRole auth mount or role 'homelab' is missing or unreadable
          at auth/approle/role/homelab on {{ vault_effective_addr }}. Run
          scripts/seed-vault.sh with VAULT_ADDR={{ vault_effective_addr }} and
          an admin Vault token, then rerun this playbook.

    - name: Ensure external-secrets namespace exists
      kubernetes.core.k8s:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: external-secrets

    - name: Check existing vault-approle Secret
      kubernetes.core.k8s_info:
        kubeconfig: "{{ bootstrap_kubeconfig }}"
        api_version: v1
        kind: Secret
        namespace: external-secrets
        name: vault-approle
      register: vault_approle_secret_check
      no_log: true

    - name: Store existing vault-approle Secret data
      set_fact:
        vault_approle_secret_data: "{{ vault_approle_secret_check.resources[0].data | default({}) }}"
      when: vault_approle_secret_check.resources | length > 0
      no_log: true

    - name: Decide whether vault-approle Secret needs seeding
      set_fact:
        vault_approle_secret_needs_seed: >-
          {{
            vault_rotate_approle_secret | bool
            or vault_approle_secret_check.resources | length == 0
            or (vault_approle_secret_data | default({})).get('role-id', '') | length == 0
            or (vault_approle_secret_data | default({})).get('secret-id', '') | length == 0
          }}
      no_log: true

    - name: Create local temp directory for Vault values
      command: mktemp -d /tmp/vault-bootstrap.XXXXXX
      register: vault_temp_dir
      changed_when: false
      when: vault_approle_secret_needs_seed

    - name: Read and apply Vault AppRole Secret
      block:
        - name: Read AppRole role-id from Vault
          shell: |
            vault read -field=role_id auth/approle/role/homelab/role-id > "{{ vault_temp_dir.stdout }}/role-id"
          register: vault_role_id
          changed_when: false
          environment: "{{ vault_cli_environment }}"

        - name: Generate a fresh AppRole secret-id
          shell: |
            vault write -force -field=secret_id auth/approle/role/homelab/secret-id > "{{ vault_temp_dir.stdout }}/secret-id"
          register: vault_secret_id
          changed_when: true
          environment: "{{ vault_cli_environment }}"

        - name: Read rendered Vault values from temp files
          slurp:
            src: "{{ vault_temp_dir.stdout }}/{{ item }}"
          loop:
            - role-id
            - secret-id
          register: vault_value_files
          no_log: true

        - name: Store Vault values as facts
          set_fact:
            vault_role_id_value: "{{ vault_value_files.results[0].content | b64decode | trim }}"
            vault_secret_id_value: "{{ vault_value_files.results[1].content | b64decode | trim }}"
          no_log: true

        - name: Apply vault-approle Secret
          kubernetes.core.k8s:
            kubeconfig: "{{ bootstrap_kubeconfig }}"
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: vault-approle
                namespace: external-secrets
              type: Opaque
              data:
                role-id: "{{ vault_role_id_value | b64encode }}"
                secret-id: "{{ vault_secret_id_value | b64encode }}"
          no_log: true
      when: vault_approle_secret_needs_seed
      always:
        - name: Remove local temp directory for Vault values
          file:
            path: "{{ vault_temp_dir.stdout }}"
            state: absent
          when: vault_temp_dir is defined
          no_log: true
