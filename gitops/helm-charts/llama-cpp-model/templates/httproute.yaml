apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llama-cpp-{{ .Values.slug }}
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: default-gateway
      namespace: gateway-system
  hostnames:
    - {{ .Values.hostname | quote }}
  rules:
    - backendRefs:
        - name: llama-cpp-{{ .Values.slug }}
          port: {{ .Values.port }}
