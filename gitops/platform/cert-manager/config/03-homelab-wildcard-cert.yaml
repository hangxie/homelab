apiVersion: v1
kind: Namespace
metadata:
  name: gateway-system
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-wildcard
  namespace: gateway-system
spec:
  secretName: homelab-wildcard-tls
  duration: 2160h       # 90d (LE max)
  renewBefore: 720h     # 30d
  commonName: "*.homelab.xiehang.com"
  dnsNames:
    - "*.homelab.xiehang.com"
    - "homelab.xiehang.com"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
