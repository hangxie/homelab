# Rook 1.20+ no longer deploys CSI drivers from the rook-ceph chart; the
# Driver/OperatorConfig CRs come from this ceph-csi-drivers chart instead.
# Driver names must match the provisioner names already baked into existing
# StorageClasses (rook-ceph.{rbd,cephfs}.csi.ceph.com).

operatorConfig:
  namespace: rook-ceph
  driverSpecDefaults:
    imageSet:
      name: rook-csi-operator-image-set-configmap
    # Keep these defaults for future Driver CRs. The chart also renders empty
    # per-driver toleration lists, so enabled drivers below repeat the GPU
    # toleration explicitly.
    nodePlugin:
      priorityClassName: system-node-critical
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
    controllerPlugin:
      priorityClassName: system-cluster-critical
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule

drivers:
  rbd:
    enabled: true
    name: rook-ceph.rbd.csi.ceph.com
    nodePlugin:
      priorityClassName: system-node-critical
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
    controllerPlugin:
      priorityClassName: system-cluster-critical
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
  cephfs:
    enabled: true
    name: rook-ceph.cephfs.csi.ceph.com
    nodePlugin:
      priorityClassName: system-node-critical
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
    controllerPlugin:
      priorityClassName: system-cluster-critical
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
  nfs:
    enabled: false
    name: rook-ceph.nfs.csi.ceph.com
  nvmeof:
    enabled: false
    name: rook-ceph.nvmeof.csi.ceph.com
