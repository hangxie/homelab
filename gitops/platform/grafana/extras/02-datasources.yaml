apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: grafana
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: mimir
        url: http://mimir-nginx.mimir/prometheus
        isDefault: true
        jsonData:
          httpMethod: POST
          timeInterval: 60s
      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway.loki
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.tempo:3100
        jsonData:
          httpMethod: GET
          tracesToLogsV2:
            datasourceUid: loki
          lokiSearch:
            datasourceUid: loki
