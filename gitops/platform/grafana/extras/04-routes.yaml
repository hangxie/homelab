apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: grafana
spec:
  parentRefs:
    - name: default-gateway
      namespace: gateway-system
  hostnames:
    - "grafana.homelab.xiehang.com"
  rules:
    - backendRefs:
        - name: grafana
          port: 80
