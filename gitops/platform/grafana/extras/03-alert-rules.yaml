apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alert-rules
  namespace: grafana
  labels:
    grafana_alert: "1"
data:
  disk-alerts.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: node-disk
        folder: homelab
        interval: 1m
        rules:
          - uid: node-disk-warning
            title: NodeFilesystemAlmostOutOfSpace (warning)
            condition: A
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "Filesystem has less than 15% space left"
              description: "Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf \"%.2f\" $values.A.Value }}% available space."
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: mimir
                model:
                  expr: |
                    (
                      node_filesystem_avail_bytes{job="node-exporter",fstype!=""}
                      / node_filesystem_size_bytes{job="node-exporter",fstype!=""} * 100 < 15
                    and
                      node_filesystem_readonly{job="node-exporter",fstype!=""} == 0
                    )
                  intervalMs: 60000
                  maxDataPoints: 43200
                  instant: true
          - uid: node-disk-critical
            title: NodeFilesystemAlmostOutOfSpace (critical)
            condition: A
            for: 30m
            labels:
              severity: critical
            annotations:
              summary: "Filesystem has less than 5% space left"
              description: "Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf \"%.2f\" $values.A.Value }}% available space."
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: mimir
                model:
                  expr: |
                    (
                      node_filesystem_avail_bytes{job="node-exporter",fstype!=""}
                      / node_filesystem_size_bytes{job="node-exporter",fstype!=""} * 100 < 5
                    and
                      node_filesystem_readonly{job="node-exporter",fstype!=""} == 0
                    )
                  intervalMs: 60000
                  maxDataPoints: 43200
                  instant: true
