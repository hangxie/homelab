replicas: 2

# Default liveness grace (60s + 10*10s) is too short for first-boot DB
# migrations on this cluster's storage; kubelet was killing the container
# mid-migration, causing an endless crash loop.
livenessProbe:
  httpGet:
    path: /api/health
    port: grafana
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 30
  failureThreshold: 40

admin:
  existingSecret: grafana-admin
  userKey: username
  passwordKey: password

defaultDashboardsTimezone: browser

sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
    label: grafana_dashboard
    labelValue: "1"
    folderAnnotation: k8s-sidecar-target-directory
    provider:
      foldersFromFilesStructure: true
  datasources:
    enabled: true
    searchNamespace: ALL
    label: grafana_datasource
    labelValue: "1"
  alerts:
    enabled: true
    searchNamespace: ALL
    label: grafana_alert
    labelValue: "1"

# SQLite replaced by Postgres; PVC no longer holds application state.
# Existing PVC is left intact (Prune=false) and can be removed manually.
persistence:
  enabled: false

grafana.ini:
  database:
    type: postgres
    host: postgres-cluster-rw.postgres-cluster.svc:5432
    name: grafana
    user: $__env{GF_DATABASE_USER}
    password: $__env{GF_DATABASE_PASSWORD}
    ssl_mode: disable
  # Cap annotation history (incl. alert state-change annotations) at 7 days.
  # Grafana keeps annotations forever by default; its periodic cleanup job
  # deletes anything older than max_age.
  annotations.dashboard:
    max_age: 7d
  annotations.api:
    max_age: 7d

envValueFrom:
  GF_DATABASE_USER:
    secretKeyRef:
      name: grafana-db-credentials
      key: username
  GF_DATABASE_PASSWORD:
    secretKeyRef:
      name: grafana-db-credentials
      key: password

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: grafana
        topologyKey: kubernetes.io/hostname

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: infrastructure
        orgId: 1
        folder: Infrastructure
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/infrastructure
      - name: kubernetes
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kubernetes
      - name: platform
        orgId: 1
        folder: Platform
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/platform
      - name: observability
        orgId: 1
        folder: Observability
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/observability
      - name: workloads
        orgId: 1
        folder: Workloads
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/workloads

dashboards:
  infrastructure:
    node-exporter-full:
      gnetId: 1860
      revision: 45
      datasource: Mimir
  kubernetes:
    k8s-views-global:
      gnetId: 15760
      datasource: Mimir
    k8s-views-namespaces:
      gnetId: 15761
      datasource: Mimir
    k8s-views-nodes:
      gnetId: 15762
      datasource: Mimir
    # k8s-views-pods is provisioned via extras/06-k8s-views-pods-dashboard.yaml
    # so the datasource variable can default to Mimir (gnetId sets it to "Prometheus").
  platform:
    argocd:
      gnetId: 14584
      datasource: Mimir
    rook-ceph-cluster:
      url: https://raw.githubusercontent.com/rook/rook/v1.20.0/deploy/examples/monitoring/grafana/Ceph%20Cluster%20Dashboard.json
      datasource: Mimir
    rook-ceph-osd:
      url: https://raw.githubusercontent.com/rook/rook/v1.20.0/deploy/examples/monitoring/grafana/Ceph%20OSD%20Single%20Dashboard.json
      datasource: Mimir
    rook-ceph-pool:
      url: https://raw.githubusercontent.com/rook/rook/v1.20.0/deploy/examples/monitoring/grafana/Ceph%20Pools%20Dashboard.json
      datasource: Mimir
  observability:
    grafana-alloy:
      gnetId: 13659
      datasource: Mimir
    tempo:
      gnetId: 23242
      revision: 1
      datasource: Mimir
  workloads:
    airflow:
      gnetId: 21483
      datasource: Mimir
    cassandra:
      gnetId: 5408
      datasource: Mimir
    clickhouse:
      gnetId: 14192
      datasource: Mimir
    hdfs:
      gnetId: 12236
      datasource: Mimir
    mysql:
      gnetId: 14057
      datasource: Mimir
    ray:
      gnetId: 14708
      datasource: Mimir
    redis:
      gnetId: 763
      datasource: Mimir
    spark:
      gnetId: 7890
      datasource: Mimir
    trino:
      gnetId: 20208
      datasource: Mimir
