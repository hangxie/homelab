replicas: 2

admin:
  existingSecret: grafana-admin
  userKey: username
  passwordKey: password

defaultDashboardsTimezone: browser

sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
    label: grafana_dashboard
    labelValue: "1"
  datasources:
    enabled: true
    searchNamespace: ALL
    label: grafana_datasource
    labelValue: "1"
  alerts:
    enabled: true
    searchNamespace: ALL
    label: grafana_alert
    labelValue: "1"

# SQLite replaced by Postgres; PVC no longer holds application state.
# Existing PVC is left intact (Prune=false) and can be removed manually.
persistence:
  enabled: false

grafana.ini:
  database:
    type: postgres
    host: postgres-cluster-rw.postgres-cluster.svc:5432
    name: grafana
    user: $__env{GF_DATABASE_USER}
    password: $__env{GF_DATABASE_PASSWORD}
    ssl_mode: disable

envValueFrom:
  GF_DATABASE_USER:
    secretKeyRef:
      name: grafana-db-credentials
      key: username
  GF_DATABASE_PASSWORD:
    secretKeyRef:
      name: grafana-db-credentials
      key: password

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: grafana
        topologyKey: kubernetes.io/hostname
