apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-s3
  namespace: loki
spec:
  refreshInterval: 1h
  # Pull from the rook-produced Secret directly via a kubernetes provider
  # to avoid sending RGW keys through Vault. The rook-ceph operator owns
  # the source Secret in rook-ceph and rotates it via Rook controllers.
  secretStoreRef:
    name: rook-ceph-rgw-loki
    kind: ClusterSecretStore
  target:
    name: loki-s3
    creationPolicy: Owner
    template:
      data:
        ACCESS_KEY_ID: "{{ .access_key }}"
        SECRET_ACCESS_KEY: "{{ .secret_key }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: rook-ceph-object-user-object-store-loki
        property: AccessKey
    - secretKey: secret_key
      remoteRef:
        key: rook-ceph-object-user-object-store-loki
        property: SecretKey
---
# Cross-namespace pull store. The Rook user Secret is in rook-ceph; ESO
# reads it via a Kubernetes provider scoped at the cluster level.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: rook-ceph-rgw-loki
spec:
  provider:
    kubernetes:
      remoteNamespace: rook-ceph
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: kube-system
          key: ca.crt
      auth:
        serviceAccount:
          name: external-secrets
          namespace: external-secrets
