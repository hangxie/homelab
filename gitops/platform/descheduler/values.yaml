schedule: "*/10 * * * *"

deschedulerPolicy:
  metricsProviders:
    - source: KubernetesMetrics
  namespaces:
    exclude:
      - ray
  maxNoOfPodsToEvictPerNode: 2
  maxNoOfPodsToEvictPerNamespace: 2
  profiles:
    - name: default
      pluginConfig:
        - name: DefaultEvictor
          args:
            podProtections:
              defaultDisabled:
                - "PodsWithLocalStorage"
              extraEnabled:
                - "PodsWithPVC"
        - name: RemoveDuplicates
        - name: RemovePodsHavingTooManyRestarts
          args:
            podRestartThreshold: 100
            includingInitContainers: true
        - name: RemovePodsViolatingNodeAffinity
          args:
            nodeAffinityType:
              - requiredDuringSchedulingIgnoredDuringExecution
        - name: RemovePodsViolatingNodeTaints
        - name: RemovePodsViolatingInterPodAntiAffinity
        - name: RemovePodsViolatingTopologySpreadConstraint
        - name: LowNodeUtilization
          args:
            # memory omitted: baseline memory footprint sits ~55-80% on every
            # worker, so a memory threshold would never classify any node as
            # underutilized; cpu/pods are the actual imbalance signal here.
            thresholds:
              cpu: 25
              pods: 25
            targetThresholds:
              cpu: 50
              pods: 50
      plugins:
        balance:
          enabled:
            - RemoveDuplicates
            - RemovePodsViolatingTopologySpreadConstraint
            - LowNodeUtilization
        deschedule:
          enabled:
            - RemovePodsHavingTooManyRestarts
            - RemovePodsViolatingNodeTaints
            - RemovePodsViolatingNodeAffinity
            - RemovePodsViolatingInterPodAntiAffinity
