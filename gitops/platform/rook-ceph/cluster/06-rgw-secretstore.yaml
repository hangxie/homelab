# Cluster-scoped External Secrets store that exposes the rook-ceph
# namespace to ExternalSecrets in any namespace. Consumers (spark,
# trino, …) reference this store to mirror their per-user
# Rook-generated Secret into their own namespace.
#
# Loki has its own per-namespace store
# (gitops/platform/loki/extras/loki-s3-externalsecret.yaml) and is
# intentionally not migrated here.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: rook-ceph-rgw
spec:
  provider:
    kubernetes:
      remoteNamespace: rook-ceph
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: kube-system
          key: ca.crt
      auth:
        serviceAccount:
          name: external-secrets
          namespace: external-secrets
