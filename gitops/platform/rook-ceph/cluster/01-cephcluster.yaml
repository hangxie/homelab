apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  cephVersion:
    # Rook 1.20 dropped Reef (v18.x) — Squid (v19.x) is the floor.
    image: quay.io/ceph/ceph:v19.2.4
  cephConfig:
    mon:
      mon_data_avail_warn: "15"
      mon_data_avail_crit: "5"
  dataDirHostPath: /var/lib/rook
  mon:
    count: 3
    allowMultiplePerNode: false
  mgr:
    count: 2
    modules:
      - name: rook
        enabled: true
  dashboard:
    enabled: true
    port: 7000
    ssl: false
  monitoring:
    enabled: false
  network:
    connections:
      encryption:
        enabled: false
      compression:
        enabled: false
  crashCollector:
    disable: false
  logCollector:
    enabled: true
    periodicity: daily
  # Loosen the daemon liveness probes: the 5s default is too tight while
  # the mon's RocksDB is still ramping up and during initial OSD bootstrap,
  # which produces a kubelet-driven restart storm.
  healthCheck:
    livenessProbe:
      mon:
        probe:
          timeoutSeconds: 30
          periodSeconds: 15
          failureThreshold: 5
          initialDelaySeconds: 30
      mgr:
        probe:
          timeoutSeconds: 30
          periodSeconds: 15
          failureThreshold: 5
      osd:
        probe:
          timeoutSeconds: 30
          periodSeconds: 15
          failureThreshold: 5
  storage:
    # No node enumeration — the OSD topology is derived, not duplicated.
    # Rook applies this device selection to every node, but an OSD only
    # materializes where BOTH conditions hold, and both come straight from
    # terraform.tfvars (the single source of truth):
    #   1. The scsi1 data disk exists — only non-GPU workers are given a
    #      second disk; masters and GPU workers have scsi0 only.
    #   2. The OSD pod can schedule there — placement.osd below tolerates
    #      neither the control-plane taint (masters) nor gpu=true:NoSchedule
    #      (GPU workers), so both are excluded automatically.
    # Adding/removing a data-disk worker in terraform needs no change here.
    useAllNodes: true
    useAllDevices: false
    devices:
      - name: "/dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi1"
  placement:
    all:
      tolerations: []
    osd:
      tolerations: []
  disruptionManagement:
    managePodBudgets: true
