crds:
  enabled: true

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Prometheus stack creates the ServiceMonitor itself once enabled below.
monitoring:
  enabled: true

cephCommandsTimeoutSeconds: "60"

# CSI driver settings (including the GPU-node tolerations) live in the
# ceph-csi-drivers Application — Rook 1.20 stopped accepting csi.* fields here.
