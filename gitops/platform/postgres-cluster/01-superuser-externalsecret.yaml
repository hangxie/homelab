apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-cluster-superuser
  namespace: postgres-cluster
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: postgres-cluster-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: postgres-cnpg/superuser
        property: username
    - secretKey: password
      remoteRef:
        key: postgres-cnpg/superuser
        property: password
