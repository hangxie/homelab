# Basic HA deployment for homelab.
# Disable zone-aware replication throughout (requires 3+ zones).
# S3 credentials come from the mimir-blocks OBC Secret (mimir namespace).

metaMonitoring:
  dashboards:
    enabled: true
    namespace: grafana
    annotations:
      k8s-sidecar-target-directory: /tmp/dashboards/Mimir

mimir:
  structuredConfig:
    common:
      storage:
        backend: s3
        s3:
          endpoint: rook-ceph-rgw-object-store.rook-ceph.svc:80
          region: us-east-1
          insecure: true
          access_key_id: ${AWS_ACCESS_KEY_ID}
          secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    blocks_storage:
      s3:
        bucket_name: mimir-blocks
    ingester:
      ring:
        replication_factor: 2
    store_gateway:
      sharding_ring:
        replication_factor: 2
    limits:
      ingestion_rate: 100000
      ingestion_burst_size: 2000000
      max_global_series_per_user: 2000000
      # Delete metric blocks older than 7 days (compactor enforces this).
      compactor_blocks_retention_period: 7d

ingester:
  replicas: 2
  zoneAwareReplication:
    enabled: false
  extraEnvFrom:
    - secretRef:
        name: mimir-blocks
  persistentVolume:
    storageClass: rook-ceph-block
    size: 20Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: ingester
          topologyKey: kubernetes.io/hostname

store_gateway:
  replicas: 2
  zoneAwareReplication:
    enabled: false
  extraEnvFrom:
    - secretRef:
        name: mimir-blocks
  persistentVolume:
    storageClass: rook-ceph-block
    size: 10Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: store-gateway
          topologyKey: kubernetes.io/hostname

compactor:
  replicas: 1
  extraEnvFrom:
    - secretRef:
        name: mimir-blocks
  persistentVolume:
    storageClass: rook-ceph-block
    size: 10Gi

distributor:
  replicas: 2
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: distributor
          topologyKey: kubernetes.io/hostname

querier:
  replicas: 2
  extraEnvFrom:
    - secretRef:
        name: mimir-blocks
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: querier
          topologyKey: kubernetes.io/hostname

query_frontend:
  replicas: 2
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: query-frontend
          topologyKey: kubernetes.io/hostname

# Disable alertmanager and ruler — Grafana built-in alerting is used instead.
alertmanager:
  enabled: false
  replicas: 0

ruler:
  enabled: false
  replicas: 0

# Disable the MinIO dependency (using Ceph RGW instead).
minio:
  enabled: false

kafka:
  replicas: 2
  persistence:
    size: 80Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: kafka
          topologyKey: kubernetes.io/hostname
  extraEnv:
    # Size-based cap per partition so the topic can't fill the PVC even if the
    # chart's hardcoded 24h time-based retention lags behind the ingest rate.
    - name: KAFKA_LOG_RETENTION_BYTES
      value: "8589934592" # 8Gi
    - name: KAFKA_DEFAULT_REPLICATION_FACTOR
      value: "2"
