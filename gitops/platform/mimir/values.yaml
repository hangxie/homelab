# Basic HA deployment for homelab.
# Disable zone-aware replication throughout (requires 3+ zones).
# S3 credentials come from the mimir-blocks OBC Secret (mimir namespace).

mimir:
  structuredConfig:
    common:
      storage:
        backend: s3
        s3:
          endpoint: rook-ceph-rgw-object-store.rook-ceph.svc:80
          region: us-east-1
          insecure: true
          access_key_id: ${AWS_ACCESS_KEY_ID}
          secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    blocks_storage:
      s3:
        bucket_name: mimir-blocks
    ingester:
      ring:
        replication_factor: 2
    store_gateway:
      sharding_ring:
        replication_factor: 2

ingester:
  replicas: 2
  zoneAwareReplication:
    enabled: false
  extraEnvFrom:
    - secretRef:
        name: mimir-blocks
  persistentVolume:
    storageClass: rook-ceph-block
    size: 20Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: ingester
          topologyKey: kubernetes.io/hostname

store_gateway:
  replicas: 2
  zoneAwareReplication:
    enabled: false
  extraEnvFrom:
    - secretRef:
        name: mimir-blocks
  persistentVolume:
    storageClass: rook-ceph-block
    size: 10Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: store-gateway
          topologyKey: kubernetes.io/hostname

compactor:
  replicas: 1
  extraEnvFrom:
    - secretRef:
        name: mimir-blocks
  persistentVolume:
    storageClass: rook-ceph-block
    size: 10Gi

distributor:
  replicas: 2
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: distributor
          topologyKey: kubernetes.io/hostname

querier:
  replicas: 2
  extraEnvFrom:
    - secretRef:
        name: mimir-blocks
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: querier
          topologyKey: kubernetes.io/hostname

query_frontend:
  replicas: 2
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: query-frontend
          topologyKey: kubernetes.io/hostname

# Disable alertmanager and ruler — Grafana built-in alerting is used instead.
alertmanager:
  enabled: false
  replicas: 0

ruler:
  enabled: false
  replicas: 0

# Disable the MinIO dependency (using Ceph RGW instead).
minio:
  enabled: false

kafka:
  persistence:
    size: 20Gi
  controller:
    replicaCount: 2
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/component: controller
                app.kubernetes.io/name: kafka
            topologyKey: kubernetes.io/hostname
