fullnameOverride: prometheus-stack

# Cilium drops Cilium/Hubble dashboards in monitoring; Grafana's sidecar
# must search every namespace to discover them.
grafana:
  admin:
    existingSecret: grafana-admin
    userKey: username
    passwordKey: password
  defaultDashboardsTimezone: browser
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
      labelValue: "1"
    datasources:
      enabled: true
      searchNamespace: ALL
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus-stack
  persistence:
    enabled: true
    storageClassName: rook-ceph-block
    size: 5Gi
    annotations:
      argocd.argoproj.io/sync-options: Prune=false

prometheus:
  prometheusSpec:
    retention: 30d
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: rook-ceph-block
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: rook-ceph-block
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 5Gi

kubeProxy:
  enabled: false

kubeEtcd:
  service:
    port: 2381
    targetPort: 2381

defaultRules:
  create: true
  disabled:
    NodeFilesystemAlmostOutOfSpace: true
  rules:
    kubeProxy: false

additionalPrometheusRulesMap:
  custom-disk-rules:
    groups:
      - name: node-exporter.rules
        rules:
          - alert: NodeFilesystemAlmostOutOfSpace
            annotations:
              description: Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutofspace
              summary: Filesystem has less than 15% space left.
            expr: |
              (
                node_filesystem_avail_bytes{job="node-exporter",fstype!=""} / node_filesystem_size_bytes{job="node-exporter",fstype!=""} * 100 < 15
              and
                node_filesystem_readonly{job="node-exporter",fstype!=""} == 0
              )
            for: 30m
            labels:
              severity: warning
          - alert: NodeFilesystemAlmostOutOfSpace
            annotations:
              description: Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutofspace
              summary: Filesystem has less than 5% space left.
            expr: |
              (
                node_filesystem_avail_bytes{job="node-exporter",fstype!=""} / node_filesystem_size_bytes{job="node-exporter",fstype!=""} * 100 < 5
              and
                node_filesystem_readonly{job="node-exporter",fstype!=""} == 0
              )
            for: 30m
            labels:
              severity: critical
