# Shared namespace infrastructure for all llama.cpp model instances.
# Deploys in wave 700 so the PVC and secrets exist before model pods start.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llama-cpp-shared
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "700"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workloads
  source:
    repoURL: https://github.com/hangxie/homelab.git
    targetRevision: main
    path: gitops/workloads/raw/llama-cpp/shared
  destination:
    server: https://kubernetes.default.svc
    namespace: llama-cpp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
---
# LiteLLM proxy — unified OpenAI-compatible endpoint across all llama.cpp models.
# Deploys in wave 720 so the per-model Services exist before LiteLLM starts.
# When adding or removing a model from llama-cpp-models, also update the
# model_list in gitops/workloads/raw/llama-cpp/litellm/litellm.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llama-cpp-litellm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "720"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workloads
  source:
    repoURL: https://github.com/hangxie/homelab.git
    targetRevision: main
    path: gitops/workloads/raw/llama-cpp/litellm
  destination:
    server: https://kubernetes.default.svc
    namespace: llama-cpp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
---
# Per-model ApplicationSet. Edit the elements list to add or remove models.
# Each entry deploys one Deployment + Service into the llama-cpp namespace.
# External access is via LiteLLM (llama-cpp-litellm above), not per-model routes.
# The shared PVC (llama-cpp-models, RWX) is mounted by all model pods.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: llama-cpp-models
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "710"
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - slug: qwen3-0b6
            modelSpec: "bartowski/Qwen_Qwen3-0.6B-GGUF/Qwen_Qwen3-0.6B-Q6_K.gguf"
          - slug: gemma3-1b
            modelSpec: "bartowski/google_gemma-3-1b-it-GGUF/google_gemma-3-1b-it-Q6_K.gguf"
  template:
    metadata:
      name: 'llama-cpp-{{ .slug }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: workloads
      source:
        repoURL: https://github.com/hangxie/homelab.git
        targetRevision: main
        path: gitops/helm-charts/llama-cpp-model
        helm:
          valuesObject:
            slug: '{{ .slug }}'
            modelSpec: '{{ .modelSpec }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: llama-cpp
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
