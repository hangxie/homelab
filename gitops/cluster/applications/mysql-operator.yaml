apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "97"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://mysql.github.io/mysql-operator/
      chart: mysql-operator
      targetRevision: 2.2.8
      helm:
        valueFiles:
          - $values/gitops/platform/mysql-operator/values.yaml
    - repoURL: https://github.com/hangxie/homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: mysql-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
