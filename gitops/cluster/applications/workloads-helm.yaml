apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads-helm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "110"
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                # Mandatory — required for the cluster's data platform.
                - name: hive
                # Optional — comment a line out to disable that workload.
                # Pruning is automatic: a disabled workload's resources
                # (including PVCs) are deleted on the next Argo sync.
                - name: airflow
                # - name: cassandra
                - name: clickhouse
                - name: headlamp
                - name: jupyter
                - name: openwebui
                - name: scylladb
                - name: spark
                - name: superset
                - name: trino
          - git:
              repoURL: https://github.com/hangxie/homelab.git
              revision: main
              files:
                - path: 'gitops/workloads/helm/{{ .name }}/config.json'
  template:
    metadata:
      name: 'wl-{{ .path.basename }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: workloads
      sources:
        - repoURL: '{{ .chart_repo }}'
          chart: '{{ .chart_name }}'
          targetRevision: '{{ .chart_version }}'
          helm:
            valueFiles:
              - $values/{{ .path.path }}/values.yaml
        - repoURL: https://github.com/hangxie/homelab.git
          targetRevision: main
          ref: values
        - repoURL: https://github.com/hangxie/homelab.git
          targetRevision: main
          path: '{{ .path.path }}/extras'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .path.basename }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
