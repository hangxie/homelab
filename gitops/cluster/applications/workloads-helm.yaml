apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads-helm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "710"
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                # Mandatory — required for the cluster's data platform.
                - name: hive
                # Optional — comment a line out to disable that workload.
                # Pruning is automatic: a disabled workload's resources
                # (including PVCs) are deleted on the next Argo sync.
                - name: airflow
                # - name: cassandra
                - name: clickhouse
                - name: headlamp
                - name: jupyter
                - name: openwebui
                - name: scylladb
                - name: spark
                - name: superset
                - name: trino
                - name: mysqld-exporter
          - git:
              repoURL: https://github.com/hangxie/homelab.git
              revision: main
              files:
                - path: 'gitops/workloads/helm/{{ .name }}/config.json'
  template:
    metadata:
      name: 'wl-{{ .path.basename }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: workloads
      sources:
        - repoURL: '{{ .chart_repo }}'
          chart: '{{ .chart_name }}'
          targetRevision: '{{ .chart_version }}'
          helm:
            valueFiles:
              - $values/{{ .path.path }}/values.yaml
        - repoURL: https://github.com/hangxie/homelab.git
          targetRevision: main
          ref: values
        - repoURL: https://github.com/hangxie/homelab.git
          targetRevision: main
          path: '{{ .path.path }}/extras'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .path.basename }}'
      # z2jh (jupyter) renders hub proxy-auth/cookie/cryptkeeper values
      # non-deterministically on every Argo manifest generation (randAlphaNum,
      # no cluster lookup at template time). The live secret is pinned from
      # Vault via the jupyterhub-proxy-auth ExternalSecret (creationPolicy:
      # Merge), so those keys — and the deployment pod-template checksums the
      # chart derives from them — never match the render. Ignore that render
      # noise so wl-jupyter stays Synced. Scoped by name/namespace, so these
      # entries are no-ops for every other generated workload.
      ignoreDifferences:
        - group: ""
          kind: Secret
          name: hub
          namespace: jupyter
          jsonPointers:
            - /data/hub.config.ConfigurableHTTPProxy.auth_token
            - /data/hub.config.CryptKeeper.keys
            - /data/hub.config.JupyterHub.cookie_secret
        - group: apps
          kind: Deployment
          name: hub
          namespace: jupyter
          jsonPointers:
            - /spec/template/metadata/annotations/checksum~1secret
        - group: apps
          kind: Deployment
          name: proxy
          namespace: jupyter
          jsonPointers:
            - /spec/template/metadata/annotations/checksum~1auth-token
            - /spec/template/metadata/annotations/checksum~1proxy-secret
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
