# Minimal Ray head + worker. KubeRay operator decision was deferred in the
# design (Decision unenumerated, §10.1 row); revisit when adopting KubeRay.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-head
  namespace: ray
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: ray, role: head }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ray, role: head }
    spec:
      containers:
        - name: ray-head
          image: rayproject/ray:2.39.0-py311
          command: ["ray", "start", "--head", "--port=6379", "--dashboard-host=0.0.0.0", "--block"]
          ports:
            - { name: gcs,       containerPort: 6379 }
            - { name: dashboard, containerPort: 8265 }
          resources:
            requests: { cpu: "1", memory: 4Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: ray-head
  namespace: ray
spec:
  selector: { app.kubernetes.io/name: ray, role: head }
  ports:
    - { name: gcs,       port: 6379, targetPort: gcs }
    - { name: dashboard, port: 8265, targetPort: dashboard }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-worker
  namespace: ray
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: ray, role: worker }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ray, role: worker }
    spec:
      containers:
        - name: ray-worker
          image: rayproject/ray:2.39.0-py311
          command: ["ray", "start", "--address=ray-head.ray.svc:6379", "--block"]
          resources:
            requests: { cpu: "1", memory: 4Gi }
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ray-dashboard
  namespace: ray
spec:
  parentRefs:
    - name: default-gateway
      namespace: gateway-system
  hostnames:
    - "ray.homelab.xiehang.com"
  rules:
    - backendRefs:
        - name: ray-head
          port: 8265
