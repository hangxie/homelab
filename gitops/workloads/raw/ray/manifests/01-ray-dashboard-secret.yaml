apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ray-dashboard
  namespace: ray
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: ray-dashboard
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: ray/dashboard
        property: password
