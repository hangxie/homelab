# RedisReplication: 1 master + 2 replicas, each with its own 8Gi PVC on
# rook-ceph-block. Authenticates against redis-default (synced from Vault
# path redis/default by the ExternalSecret in this directory).
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
  name: redis-replication
  namespace: redis
spec:
  clusterSize: 3
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.15
    imagePullPolicy: IfNotPresent
    redisSecret:
      name: redis-default
      key: password
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.44.0
    imagePullPolicy: IfNotPresent
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: rook-ceph-block
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 8Gi
  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
