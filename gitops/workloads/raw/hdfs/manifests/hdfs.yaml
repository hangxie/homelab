# Minimal single-NameNode + 3-DataNode HDFS. Operator-grade HDFS (HA NN,
# JournalNodes, ZKFC) belongs in a dedicated chart; this is the homelab
# starter. Re-deploy with `kubectl apply -k` once you adopt one.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hdfs-jmx-config
  namespace: hdfs
data:
  config.yaml: |
    startDelaySeconds: 0
    ssl: false
    rules:
      - pattern: "Hadoop<service=NameNode, name=(.+)><>(.+)"
        name: "hadoop_namenode_$1_$2"
        labels:
          service: namenode
      - pattern: ".*"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hdfs-config
  namespace: hdfs
data:
  core-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property><name>fs.defaultFS</name><value>hdfs://namenode.hdfs.svc:8020</value></property>
    </configuration>
  hdfs-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property><name>dfs.replication</name><value>1</value></property>
      <property><name>dfs.namenode.name.dir</name><value>file:///hadoop/dfs/name</value></property>
      <property><name>dfs.datanode.data.dir</name><value>file:///hadoop/dfs/data</value></property>
      <!-- core-site `fs.defaultFS` points at the namenode Service for client
           addressing, but the namenode process itself must bind to its pod IP
           rather than the Service ClusterIP (which it can't `bind(2)` against),
           so override every listener to 0.0.0.0 here. -->
      <property><name>dfs.namenode.rpc-bind-host</name><value>0.0.0.0</value></property>
      <property><name>dfs.namenode.servicerpc-bind-host</name><value>0.0.0.0</value></property>
      <property><name>dfs.namenode.http-bind-host</name><value>0.0.0.0</value></property>
      <property><name>dfs.namenode.https-bind-host</name><value>0.0.0.0</value></property>
    </configuration>
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: namenode
  namespace: hdfs
spec:
  serviceName: namenode
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: namenode }
  template:
    metadata:
      labels: { app.kubernetes.io/name: namenode }
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /hadoop/dfs/name && chown -R 1000:1000 /hadoop/dfs/name"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - { name: data, mountPath: /hadoop/dfs/name }
        - name: jmx-exporter-init
          image: bitnami/jmx-exporter:0.20.0
          command: ["cp", "/opt/bitnami/jmx-exporter/jmx_prometheus_javaagent.jar", "/jmx/agent/"]
          volumeMounts:
            - { name: jmx-agent, mountPath: /jmx/agent }
      containers:
        - name: namenode
          image: apache/hadoop:3.4.0
          command: ["/bin/bash", "-ec"]
          args:
            - |
              # If the namenode dir is missing its VERSION file but is non-empty
              # (e.g. a previous format was interrupted), `hdfs -format -nonInteractive`
              # refuses to overwrite the partial state and exits 1, leaving the
              # StatefulSet in CrashLoopBackOff. Wipe the directory in that case
              # so the format can complete cleanly.
              if [ ! -f /hadoop/dfs/name/current/VERSION ]; then
                rm -rf /hadoop/dfs/name/* /hadoop/dfs/name/.??*
                /opt/hadoop/bin/hdfs namenode -format -nonInteractive
              fi
              exec /opt/hadoop/bin/hdfs namenode
          env:
            - name: HADOOP_NAMENODE_OPTS
              value: "-javaagent:/jmx/agent/jmx_prometheus_javaagent.jar=9087:/jmx/config.yaml"
          ports:
            - { name: rpc, containerPort: 8020 }
            - { name: ui,  containerPort: 9870 }
            - { name: jmx, containerPort: 9087 }
          volumeMounts:
            - { name: data,       mountPath: /hadoop/dfs/name }
            - { name: config,     mountPath: /opt/hadoop/etc/hadoop }
            - { name: jmx-agent,  mountPath: /jmx/agent }
            - name: jmx-config
              mountPath: /jmx/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap: { name: hdfs-config }
        - name: jmx-agent
          emptyDir: {}
        - name: jmx-config
          configMap: { name: hdfs-jmx-config }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: rook-ceph-block
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: namenode
  namespace: hdfs
spec:
  selector: { app.kubernetes.io/name: namenode }
  ports:
    - { name: rpc, port: 8020, targetPort: rpc }
    - { name: ui,  port: 9870, targetPort: ui  }
    - { name: jmx, port: 9087, targetPort: jmx }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: datanode
  namespace: hdfs
spec:
  serviceName: datanode
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: datanode }
  template:
    metadata:
      labels: { app.kubernetes.io/name: datanode }
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /hadoop/dfs/data && chown -R 1000:1000 /hadoop/dfs/data"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - { name: data, mountPath: /hadoop/dfs/data }
      containers:
        - name: datanode
          image: apache/hadoop:3.4.0
          command: ["/opt/hadoop/bin/hdfs", "datanode"]
          ports:
            - { name: data, containerPort: 9866 }
          volumeMounts:
            - { name: data,   mountPath: /hadoop/dfs/data }
            - { name: config, mountPath: /opt/hadoop/etc/hadoop }
      volumes:
        - name: config
          configMap: { name: hdfs-config }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: rook-ceph-block
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: datanode
  namespace: hdfs
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: datanode }
  ports:
    - { name: data, port: 9866 }
