# Minimal single-NameNode + 3-DataNode HDFS. Operator-grade HDFS (HA NN,
# JournalNodes, ZKFC) belongs in a dedicated chart; this is the homelab
# starter. Re-deploy with `kubectl apply -k` once you adopt one.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hdfs-config
  namespace: hdfs
data:
  core-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property><name>fs.defaultFS</name><value>hdfs://namenode.hdfs.svc:8020</value></property>
    </configuration>
  hdfs-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property><name>dfs.replication</name><value>3</value></property>
      <property><name>dfs.namenode.name.dir</name><value>file:///hadoop/dfs/name</value></property>
      <property><name>dfs.datanode.data.dir</name><value>file:///hadoop/dfs/data</value></property>
    </configuration>
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: namenode
  namespace: hdfs
spec:
  serviceName: namenode
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: namenode }
  template:
    metadata:
      labels: { app.kubernetes.io/name: namenode }
    spec:
      containers:
        - name: namenode
          image: apache/hadoop:3.4.0
          command: ["/opt/hadoop/bin/hdfs", "namenode"]
          ports:
            - { name: rpc, containerPort: 8020 }
            - { name: ui,  containerPort: 9870 }
          volumeMounts:
            - { name: data,   mountPath: /hadoop/dfs/name }
            - { name: config, mountPath: /opt/hadoop/etc/hadoop }
      volumes:
        - name: config
          configMap: { name: hdfs-config }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: rook-ceph-block
        resources: { requests: { storage: 50Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: namenode
  namespace: hdfs
spec:
  selector: { app.kubernetes.io/name: namenode }
  ports:
    - { name: rpc, port: 8020, targetPort: rpc }
    - { name: ui,  port: 9870, targetPort: ui }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: datanode
  namespace: hdfs
spec:
  serviceName: datanode
  replicas: 3
  selector:
    matchLabels: { app.kubernetes.io/name: datanode }
  template:
    metadata:
      labels: { app.kubernetes.io/name: datanode }
    spec:
      containers:
        - name: datanode
          image: apache/hadoop:3.4.0
          command: ["/opt/hadoop/bin/hdfs", "datanode"]
          ports:
            - { name: data, containerPort: 9866 }
          volumeMounts:
            - { name: data,   mountPath: /hadoop/dfs/data }
            - { name: config, mountPath: /opt/hadoop/etc/hadoop }
      volumes:
        - name: config
          configMap: { name: hdfs-config }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: rook-ceph-block
        resources: { requests: { storage: 100Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: datanode
  namespace: hdfs
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: datanode }
  ports:
    - { name: data, port: 9866 }
