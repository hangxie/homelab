apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: llama-cpp
data:
  config.yaml: |
    model_list:
      - model_name: gemma3-1b
        litellm_params:
          model: openai/gemma3-1b
          api_base: http://llama-cpp-gemma3-1b.llama-cpp.svc:8080/v1
          api_key: dummy
      - model_name: qwen3-0b6
        litellm_params:
          model: openai/qwen3-0b6
          api_base: http://llama-cpp-qwen3-0b6.llama-cpp.svc:8080/v1
          api_key: dummy
    litellm_settings:
      drop_params: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: llama-cpp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-stable
          args: [--config, /app/config.yaml, --port, "4000"]
          ports:
            - { containerPort: 4000 }
          volumeMounts:
            - { name: config, mountPath: /app/config.yaml, subPath: config.yaml }
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: llama-cpp
spec:
  selector:
    app.kubernetes.io/name: litellm
  ports:
    - { port: 4000, targetPort: 4000 }
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litellm
  namespace: llama-cpp
spec:
  parentRefs:
    - name: default-gateway
      namespace: gateway-system
  hostnames:
    - "llama-cpp.homelab.xiehang.com"
  rules:
    - backendRefs:
        - name: litellm
          port: 4000
