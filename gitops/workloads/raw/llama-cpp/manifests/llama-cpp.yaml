apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llama-cpp-api-key
  namespace: llama-cpp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: llama-cpp-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: llama-cpp/api-key
        property: api-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-credentials
  namespace: llama-cpp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: harbor-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: harbor/llm-models
        property: username
    - secretKey: password
      remoteRef:
        key: harbor/llm-models
        property: password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llama-cpp-models
  namespace: llama-cpp
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp
  namespace: llama-cpp
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: llama-cpp }
  template:
    metadata:
      labels: { app.kubernetes.io/name: llama-cpp }
    spec:
      nodeSelector:
        feature.node.kubernetes.io/pci-10de.present: "true"
      tolerations:
        - { key: gpu, operator: Equal, value: "true", effect: NoSchedule }
      containers:
        - name: llama-cpp
          image: ghcr.io/ggerganov/llama.cpp:server-cuda
          args:
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
            - --model
            - "/models/default.gguf"
            - --n-gpu-layers
            - "999"
            - --api-key-file
            - "/run/secrets/api-key"
          ports:
            - { containerPort: 8080 }
          resources:
            limits:
              nvidia.com/gpu: "1"
          volumeMounts:
            - { name: models, mountPath: /models }
            - { name: api-key, mountPath: /run/secrets, readOnly: true }
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llama-cpp-models
        - name: api-key
          secret:
            secretName: llama-cpp-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: llama-cpp
  namespace: llama-cpp
spec:
  selector: { app.kubernetes.io/name: llama-cpp }
  ports:
    - { port: 8080, targetPort: 8080 }
