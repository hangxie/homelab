apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mysql-monitoring-credentials
  namespace: mysqld-exporter
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: mysql-monitoring-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: mysql/monitoring
        property: username
    - secretKey: password
      remoteRef:
        key: mysql/monitoring
        property: password
