apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jupyter-admin
  namespace: jupyter
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: jupyter-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: jupyter/admin
        property: password
