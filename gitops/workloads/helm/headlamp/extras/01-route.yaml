apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: headlamp
spec:
  parentRefs:
    - name: default-gateway
      namespace: gateway-system
  hostnames:
    - "headlamp.homelab.xiehang.com"
  rules:
    - backendRefs:
        - name: headlamp
          port: 80
