architecture: replication

image:
  repository: bitnamilegacy/mysql

auth:
  existingSecret: mysql-root
  database: app

global:
  storageClass: rook-ceph-block

primary:
  persistence:
    enabled: true
    size: 10Gi

secondary:
  replicaCount: 2
  persistence:
    enabled: true
    size: 10Gi
  # Bitnami chart's slave bootstrap creates root@localhost using mysql_native_password,
  # which MySQL 8.4 disables by default. Re-enable until we migrate off this chart.
  extraFlags: "--mysql-native-password=ON"

metrics:
  enabled: true
  image:
    repository: bitnamilegacy/mysqld-exporter
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus-stack
