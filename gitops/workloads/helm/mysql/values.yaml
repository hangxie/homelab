architecture: replication

image:
  repository: bitnamilegacy/mysql

auth:
  existingSecret: mysql-root
  database: app

global:
  storageClass: rook-ceph-block

primary:
  persistence:
    enabled: true
    size: 10Gi

secondary:
  replicaCount: 2
  persistence:
    enabled: true
    size: 10Gi
  # Bitnami slave bootstrap runs CHANGE REPLICATION SOURCE TO without a log
  # position, so it misses the primary's pre-existing CREATE USER events and
  # the secondary ends up with no root user. The dump-based variant mysqldumps
  # the primary first, syncing mysql.user before replication starts.
  extraEnvVars:
    - name: MYSQL_REPLICATION_SLAVE_DUMP
      value: "true"

metrics:
  enabled: true
  image:
    repository: bitnamilegacy/mysqld-exporter
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus-stack
