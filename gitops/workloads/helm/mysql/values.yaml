architecture: replication

image:
  repository: bitnamilegacy/mysql

auth:
  existingSecret: mysql-root
  database: app

global:
  storageClass: rook-ceph-block

primary:
  persistence:
    enabled: true
    size: 10Gi

secondary:
  replicaCount: 2
  persistence:
    enabled: true
    size: 10Gi

metrics:
  enabled: true
  image:
    repository: bitnamilegacy/mysqld-exporter
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus-stack
