architecture: replication

image:
  repository: bitnamilegacy/mysql

auth:
  existingSecret: mysql-root
  database: app

global:
  storageClass: rook-ceph-block

primary:
  persistence:
    enabled: true
    size: 10Gi

secondary:
  replicaCount: 2
  persistence:
    enabled: true
    size: 10Gi
  # Bitnami's MySQL 8.4 secondary bootstrap still creates the local root user
  # with mysql_native_password. Keep the plugin enabled so probes and the
  # metrics exporter can authenticate after a fresh secondary PVC bootstrap.
  extraFlags: "--mysql-native-password=ON"

metrics:
  enabled: true
  image:
    repository: bitnamilegacy/mysqld-exporter
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus-stack
