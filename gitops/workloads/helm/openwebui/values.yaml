replicaCount: 2

# v14 switched resources to the `open-webui.fullname` template
# (`<release>-open-webui`). Pin the v6 names so the existing PVC is adopted
# and the HTTPRoute / bootstrap Job continue to address `open-webui`.
fullnameOverride: open-webui

# v14 defaults these subcharts to enabled. Inference uses external llama-cpp
# and ray-vllm-serve. No Ollama server exists in the stack, so the in-app
# Ollama integration is disabled via ENABLE_OLLAMA_API below — llama-cpp
# speaks the OpenAI-compatible API at /v1, not Ollama's.
ollama:
  enabled: false
pipelines:
  enabled: false

# With 2 replicas, socket.io must not use long-polling: the polling session id
# lives in one pod's memory and the Service round-robins each poll, so polls
# hitting the other pod 400 and the client reconnect-loops (~1/s). Enabling
# websocket support makes the frontend use websocket-only transport (one TCP
# stream pinned to one pod) and runs the chart's Redis as WEBSOCKET_MANAGER so
# events emitted by one replica reach clients connected to the other.
websocket:
  enabled: true

# SQLite replaced by Postgres; uploads stored in S3 (openwebui-data OBC).
# Existing PVC is left intact (Prune=false) and can be removed manually.
persistence:
  enabled: false

openaiBaseApiUrls:
  - https://vllm.homelab.xiehang.com/v1
  - https://llama-cpp.homelab.xiehang.com/v1

extraEnvVars:
  # Neither backend authenticates, but OpenWebUI requires a key per URL.
  - name: OPENAI_API_KEYS
    value: sk-dummy;sk-dummy
  # Bootstrap Job's signup is the first user (auto-admin in OpenWebUI). Any
  # subsequent signup lands in `pending` and needs admin approval.
  - name: DEFAULT_USER_ROLE
    value: pending
  # Pin the session-JWT signing key. Unset, each replica generates its own key
  # at startup: tokens signed by one pod 401 on the other behind the Service,
  # and every restart invalidates all sessions (no PVC to persist the key file).
  - name: WEBUI_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: openwebui-secret-key
        key: secret-key
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: openwebui-db-credentials
        key: connection
  - name: STORAGE_PROVIDER
    value: s3
  - name: S3_ENDPOINT_URL
    value: http://rook-ceph-rgw-object-store.rook-ceph.svc:80
  - name: S3_REGION_NAME
    value: us-east-1
  - name: S3_BUCKET_NAME
    value: openwebui-data
  - name: S3_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: openwebui-data
        key: AWS_ACCESS_KEY_ID
  - name: S3_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: openwebui-data
        key: AWS_SECRET_ACCESS_KEY

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: open-webui
            # The websocket Redis pod shares the `name` label; scope to the
            # app component so Redis doesn't block a node for the replicas.
            app.kubernetes.io/component: open-webui
        topologyKey: kubernetes.io/hostname

service:
  type: ClusterIP
  port: 80
