apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: open-webui
  namespace: openwebui
spec:
  parentRefs:
    - name: default-gateway
      namespace: gateway-system
  hostnames:
    - "openwebui.homelab.xiehang.com"
  rules:
    - backendRefs:
        - name: open-webui
          port: 80
