apiVersion: batch/v1
kind: Job
metadata:
  name: openwebui-admin-bootstrap
  namespace: openwebui
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    # Job.spec.template is immutable; force Argo CD to replace (not patch) on
    # change, and skip server-side diff so the diff doesn't trip on immutability.
    argocd.argoproj.io/sync-options: Replace=true,ServerSideDiff=false
spec:
  backoffLimit: 15
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: signup
          image: curlimages/curl:8.10.1
          env:
            - name: ADMIN_EMAIL
              value: admin@homelab.xiehang.com
            - name: ADMIN_NAME
              value: Admin
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openwebui-admin
                  key: password
          command: [sh, -ceu]
          args:
            - |
              endpoint="http://open-webui.openwebui.svc:80"

              echo "Waiting for OpenWebUI to be ready..."
              for i in $(seq 1 60); do
                if curl -fsS -o /dev/null "${endpoint}/health"; then
                  echo "OpenWebUI is ready."
                  break
                fi
                if [ "${i}" = "60" ]; then
                  echo "OpenWebUI not ready after 5m; failing." >&2
                  exit 1
                fi
                sleep 5
              done

              # OpenWebUI persists signup settings in its DB, and recent
              # versions return 403 for signup once registration is disabled.
              # Verify the existing admin first so Argo CD resyncs are
              # idempotent without relying on signup's "email taken" behavior.
              auth_payload=$(printf '{"email":"%s","password":"%s"}' \
                "${ADMIN_EMAIL}" "${ADMIN_PASSWORD}")
              signin_code=$(curl -sS -o /tmp/signin-resp -w '%{http_code}' \
                -X POST "${endpoint}/api/v1/auths/signin" \
                -H 'Content-Type: application/json' \
                -d "${auth_payload}")
              signin_body=$(cat /tmp/signin-resp)

              case "${signin_code}" in
                200|201)
                  echo "Admin credential verified."
                  exit 0
                  ;;
                400|401|403)
                  echo "Admin signin did not verify (HTTP ${signin_code}); trying initial signup."
                  ;;
                *)
                  echo "Unexpected signin status ${signin_code}: ${signin_body}" >&2
                  exit 1
                  ;;
              esac

              # OpenWebUI auto-promotes the very first signup to admin. Vault
              # password rotation is intentionally NOT propagated here; matches
              # the Airflow admin-bootstrap behavior.
              signup_payload=$(printf '{"name":"%s","email":"%s","password":"%s"}' \
                "${ADMIN_NAME}" "${ADMIN_EMAIL}" "${ADMIN_PASSWORD}")
              signup_code=$(curl -sS -o /tmp/signup-resp -w '%{http_code}' \
                -X POST "${endpoint}/api/v1/auths/signup" \
                -H 'Content-Type: application/json' \
                -d "${signup_payload}")
              signup_body=$(cat /tmp/signup-resp)

              case "${signup_code}" in
                200) echo "Admin user created."; exit 0 ;;
                400)
                  if printf '%s' "${signup_body}" | grep -q -i 'taken'; then
                    echo "Admin user exists, but signin with the Vault-backed password failed." >&2
                    echo "Update the OpenWebUI password to match Vault, or wipe the open-webui PVC and re-sync." >&2
                    exit 1
                  fi
                  echo "Signup rejected (HTTP ${signup_code}): ${signup_body}" >&2
                  exit 1
                  ;;
                403)
                  echo "Signup forbidden. If the admin user exists, its password does not match Vault." >&2
                  echo "Otherwise enable signup or wipe the open-webui PVC before re-syncing." >&2
                  echo "Signup rejected (HTTP ${signup_code}): ${signup_body}" >&2
                  exit 1
                  ;;
                *) echo "Unexpected signup status ${signup_code}: ${signup_body}" >&2; exit 1 ;;
              esac
