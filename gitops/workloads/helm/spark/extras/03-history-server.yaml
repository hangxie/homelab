apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history-server
  namespace: spark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-history-server
  template:
    metadata:
      labels:
        app: spark-history-server
    spec:
      initContainers:
        - name: copy-spark-jars
          image: apache/spark:3.5.5
          command: ["cp", "-r", "/opt/spark/jars/.", "/all-jars/"]
          volumeMounts:
            - name: all-jars
              mountPath: /all-jars
        - name: download-s3-jars
          image: alpine:3
          command:
            - /bin/sh
            - -c
            - |
              wget -q -O /all-jars/hadoop-aws-3.3.4.jar \
                https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar && \
              wget -q -O /all-jars/aws-java-sdk-bundle-1.12.262.jar \
                https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar
          volumeMounts:
            - name: all-jars
              mountPath: /all-jars
      containers:
        - name: history-server
          image: apache/spark:3.5.5
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.history.HistoryServer
          ports:
            - containerPort: 18080
          envFrom:
            - secretRef:
                name: spark-s3
          env:
            - name: SPARK_JARS_DIR
              value: /all-jars
          volumeMounts:
            - name: spark-conf
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf
            - name: all-jars
              mountPath: /all-jars
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
      volumes:
        - name: spark-conf
          configMap:
            name: spark-defaults
        - name: all-jars
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: spark-history-server
  namespace: spark
spec:
  selector:
    app: spark-history-server
  ports:
    - port: 18080
      targetPort: 18080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spark-history-server
  namespace: spark
spec:
  parentRefs:
    - name: default-gateway
      namespace: gateway-system
  hostnames:
    - "spark-history.homelab.xiehang.com"
  rules:
    - backendRefs:
        - name: spark-history-server
          port: 18080
