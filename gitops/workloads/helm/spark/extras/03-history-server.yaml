apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history-server
  namespace: spark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-history-server
  template:
    metadata:
      labels:
        app: spark-history-server
    spec:
      containers:
        - name: history-server
          image: apache/spark:3.5.5
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.history.HistoryServer
          ports:
            - containerPort: 18080
          envFrom:
            - secretRef:
                name: spark-s3
          volumeMounts:
            - name: spark-conf
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
      volumes:
        - name: spark-conf
          configMap:
            name: spark-defaults
---
apiVersion: v1
kind: Service
metadata:
  name: spark-history-server
  namespace: spark
spec:
  selector:
    app: spark-history-server
  ports:
    - port: 18080
      targetPort: 18080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spark-history-server
  namespace: spark
spec:
  parentRefs:
    - name: default-gateway
      namespace: gateway-system
  hostnames:
    - "spark-history.homelab.xiehang.com"
  rules:
    - backendRefs:
        - name: spark-history-server
          port: 18080
