# Hadoop S3A defaults baked into spark-defaults.conf. SparkApplication
# resources opt in with `spec.sparkConfigMap: spark-defaults`; the
# operator mounts it at /etc/spark/conf and sets SPARK_CONF_DIR for
# driver and executor pods.
#
# Credentials are not in this file; AWS_ACCESS_KEY_ID and
# AWS_SECRET_ACCESS_KEY come in as env vars (see spark-s3 ExternalSecret),
# and Hadoop S3A's default provider chain picks them up.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-defaults
  namespace: spark
data:
  spark-defaults.conf: |
    spark.hadoop.fs.s3a.endpoint                  http://rook-ceph-rgw-object-store.rook-ceph.svc/
    spark.hadoop.fs.s3a.endpoint.region           us-east-1
    spark.hadoop.fs.s3a.path.style.access         true
    spark.hadoop.fs.s3a.connection.ssl.enabled    false
    spark.hadoop.fs.s3a.aws.credentials.provider  org.apache.hadoop.fs.s3a.auth.EnvironmentVariableCredentialsProvider
