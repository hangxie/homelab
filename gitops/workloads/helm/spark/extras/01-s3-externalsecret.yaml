# Mirrors Rook's CephObjectStoreUser/spark Secret from rook-ceph into
# the spark namespace under name `spark-s3`. SparkApplication driver
# and executor pods opt in with envFrom.secretRef or env entries, then
# Hadoop S3A picks AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY up through
# the EnvironmentVariableCredentialsProvider chain.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spark-s3
  namespace: spark
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: rook-ceph-rgw
    kind: ClusterSecretStore
  target:
    name: spark-s3
    creationPolicy: Owner
    template:
      data:
        AWS_ACCESS_KEY_ID: "{{ .access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ .secret_key }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: rook-ceph-object-user-object-store-spark
        property: AccessKey
    - secretKey: secret_key
      remoteRef:
        key: rook-ceph-object-user-object-store-spark
        property: SecretKey
