# Kubeflow Spark Operator replaces the old Bitnami standalone
# master/worker cluster. Spark workers are executor pods created by
# SparkApplication resources; the executor image is declared per job.
controller:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi

webhook:
  enable: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi

spark:
  # The ApplicationSet deploys this chart into namespace spark, and Spark
  # jobs are expected to live there unless another namespace is added here.
  jobNamespaces:
    - spark
  serviceAccount:
    create: true
    name: spark

prometheus:
  metrics:
    enable: true
  podMonitor:
    create: false

certManager:
  enable: true
