# Mirrors Rook's CephObjectStoreUser/trino Secret from rook-ceph into
# the trino namespace under name `trino-s3`, exposing keys
# ACCESS_KEY_ID and SECRET_ACCESS_KEY. Consumed by the Trino
# additionalCatalogs.hive entry via env-substitution in values.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: trino-s3
  namespace: trino
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: rook-ceph-rgw
    kind: ClusterSecretStore
  target:
    name: trino-s3
    creationPolicy: Owner
    template:
      data:
        ACCESS_KEY_ID: "{{ .access_key }}"
        SECRET_ACCESS_KEY: "{{ .secret_key }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: rook-ceph-object-user-object-store-trino
        property: AccessKey
    - secretKey: secret_key
      remoteRef:
        key: rook-ceph-object-user-object-store-trino
        property: SecretKey
