# Materializes the Vault-managed mysql root password into the trino
# namespace as trino-mysql, exposing MYSQL_ROOT_PASSWORD. Consumed by the
# Trino additionalCatalogs.mysql entry via env-substitution in values.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: trino-mysql
  namespace: trino
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: trino-mysql
    creationPolicy: Owner
    template:
      data:
        MYSQL_ROOT_PASSWORD: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: mysql/root
        property: password
