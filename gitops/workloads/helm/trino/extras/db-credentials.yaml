apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trino-credentials
  namespace: trino
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: trino-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: trino/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: trino/credentials
        property: password
