envFrom:
  - secretRef:
      name: trino-s3
  - secretRef:
      name: trino-mysql

coordinator:
  jvm:
    maxHeapSize: "1500M"
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
  additionalJVMConfig:
    - "-javaagent:/jmx/agent/jmx_prometheus_javaagent.jar=9087:/jmx/config.yaml"
  additionalExposedPorts:
    jmx:
      servicePort: 9087
      name: jmx
      port: 9087
      protocol: TCP
  additionalVolumes:
    - name: jmx-agent
      emptyDir: {}
    - name: jmx-config
      configMap:
        name: trino-jmx-config
  additionalVolumeMounts:
    - name: jmx-agent
      mountPath: /jmx/agent
    - name: jmx-config
      mountPath: /jmx/config.yaml
      subPath: config.yaml

worker:
  replicas: 2
  jvm:
    maxHeapSize: "3G"
  resources:
    requests:
      cpu: 1
      memory: 4Gi
  additionalJVMConfig:
    - "-javaagent:/jmx/agent/jmx_prometheus_javaagent.jar=9087:/jmx/config.yaml"
  additionalExposedPorts:
    jmx:
      servicePort: 9087
      name: jmx
      port: 9087
      protocol: TCP
  additionalVolumes:
    - name: jmx-agent
      emptyDir: {}
    - name: jmx-config
      configMap:
        name: trino-jmx-config
  additionalVolumeMounts:
    - name: jmx-agent
      mountPath: /jmx/agent
    - name: jmx-config
      mountPath: /jmx/config.yaml
      subPath: config.yaml

server:
  workers: 2
  config:
    authenticationType: PASSWORD

additionalConfigProperties:
  - internal-communication.shared-secret=homelab-trino-internal-shared-secret-20260603

auth:
  passwordAuthSecret: trino-credentials

# Catalogs reference Hive metastore (hive-metastore.hive.svc:9083) and MySQL.
additionalCatalogs:
  hive: |
    connector.name=hive
    hive.metastore.uri=thrift://hive-metastore.hive.svc:9083
    fs.native-s3.enabled=true
    s3.endpoint=http://rook-ceph-rgw-object-store.rook-ceph.svc/
    s3.region=us-east-1
    s3.path-style-access=true
    s3.aws-access-key=${ENV:ACCESS_KEY_ID}
    s3.aws-secret-key=${ENV:SECRET_ACCESS_KEY}
  mysql: |
    connector.name=mysql
    connection-url=jdbc:mysql://mysql-cluster.mysql.svc:3306
    connection-user=root
    connection-password=${ENV:MYSQL_ROOT_PASSWORD}

# JMX exporter agent — copies JAR to shared emptyDir before Trino starts.
initContainers:
  coordinator:
    - name: jmx-exporter-init
      image: alpine:3
      command: ["/bin/sh", "-c", "wget -q -O /jmx/agent/jmx_prometheus_javaagent.jar https://github.com/prometheus/jmx_exporter/releases/download/v1.6.0/jmx_prometheus_javaagent-1.6.0.jar"]
      volumeMounts:
        - name: jmx-agent
          mountPath: /jmx/agent
  worker:
    - name: jmx-exporter-init
      image: alpine:3
      command: ["/bin/sh", "-c", "wget -q -O /jmx/agent/jmx_prometheus_javaagent.jar https://github.com/prometheus/jmx_exporter/releases/download/v1.6.0/jmx_prometheus_javaagent-1.6.0.jar"]
      volumeMounts:
        - name: jmx-agent
          mountPath: /jmx/agent
