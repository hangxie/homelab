apiVersion: v1
kind: Service
metadata:
  name: cassandra
  namespace: cassandra
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  type: ClusterIP
  selector:
    cassandra.datastax.com/cluster: cassandra
    cassandra.datastax.com/datacenter: dc1
  ports:
    - name: cql
      port: 9042
      protocol: TCP
      targetPort: 9042
