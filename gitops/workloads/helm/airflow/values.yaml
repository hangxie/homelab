airflowVersion: "3.2.2"
defaultAirflowTag: "3.2.2"

executor: KubernetesExecutor

createUserJob:
  applyCustomEnv: false
  ttlSecondsAfterFinished: null
  # The chart ships this as a Helm post-install/post-upgrade hook, which Argo CD
  # maps to PostSync. PostSync only runs after all resources are Healthy, but the
  # scheduler/api-server never become Healthy until migrations are applied, so
  # this hook would deadlock and never run. Render it as a plain Job and re-tag it
  # as an Argo CD Sync hook (see migrateDatabaseJob for the full rationale).
  useHelmHooks: false
  jobAnnotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
  # The Job is a Sync hook, but its ServiceAccount is a plain resource that
  # defaults to wave 0 -- the same wave as the Job. Pull the SA into an earlier
  # wave so it always exists before the hook pod is created (see
  # migrateDatabaseJob.serviceAccount for the full rationale).
  serviceAccount:
    annotations:
      argocd.argoproj.io/sync-wave: "-1"
  defaultUser:
    enabled: true
    username: admin
    email: admin@homelab.xiehang.com
  # Chart hardcodes the `-p` arg from defaultUser.password. Override args to
  # read the password from the airflow-admin Secret (sourced from Vault).
  env:
    - name: AIRFLOW_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: airflow-admin
          key: password
  args:
    - "bash"
    - "-c"
    - |-
      exec \
      airflow users create "$@"
    - --
    - "-r"
    - "{{ .Values.createUserJob.defaultUser.role }}"
    - "-u"
    - "{{ .Values.createUserJob.defaultUser.username }}"
    - "-e"
    - "{{ .Values.createUserJob.defaultUser.email }}"
    - "-f"
    - "{{ .Values.createUserJob.defaultUser.firstName }}"
    - "-l"
    - "{{ .Values.createUserJob.defaultUser.lastName }}"
    - "-p"
    - "$(AIRFLOW_ADMIN_PASSWORD)"

migrateDatabaseJob:
  applyCustomEnv: false
  ttlSecondsAfterFinished: null
  # The chart ships migrations as a Helm post-install/post-upgrade hook -> Argo CD
  # PostSync. PostSync runs only after every resource is Healthy, but the
  # scheduler/api-server/triggerer block in their `wait-for-airflow-migrations`
  # init container until migrations exist. That is a deadlock: deployments wait on
  # migrations, migrations wait on deployments being Healthy. Disable the Helm
  # hooks and re-tag the rendered Job as an Argo CD Sync hook at wave -1 so it runs
  # after the DB bootstrap (wave -2) and before the deployments (wave 0).
  useHelmHooks: false
  jobAnnotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
  # The migrate Job is a Sync hook at wave -1, but its ServiceAccount renders as a
  # plain resource at the default wave 0 -- i.e. after the hook. Argo CD then runs
  # the hook Job before the SA exists, so pod creation fails with
  # "serviceaccount ... not found" and the sync deadlocks on the never-completing
  # hook. Move the SA to wave -2 (with the DB bootstrap) so it is always present
  # before the migration hook runs.
  serviceAccount:
    annotations:
      argocd.argoproj.io/sync-wave: "-2"

apiSecretKeySecretName: airflow-api-secret-key
jwtSecretName: airflow-jwt-secret
fernetKeySecretName: airflow-fernet-key

# The migrate (wave -1) and create-user (wave 0) Jobs run as Sync hooks and mount
# this airflow config ConfigMap, which otherwise renders as a plain resource at
# the default wave 0 -- after the migrate hook. The hook pod then hangs with
# "configmap wl-airflow-config not found". Pull the ConfigMap into an earlier wave
# so it always exists before any hook Job runs.
airflowConfigAnnotations:
  argocd.argoproj.io/sync-wave: "-3"

data:
  metadataConnection:
    user: airflow
    pass: ""        # supplied via metadataSecretName
    protocol: postgresql
    host: postgres-cluster-rw.postgres-cluster.svc
    port: 5432
    db: airflow
    sslmode: disable
  metadataSecretName: airflow-db-credentials

postgresql:
  enabled: false

redis:
  enabled: true
  persistence:
    enabled: true
    storageClassName: rook-ceph-block

dags:
  persistence:
    enabled: true
    storageClassName: rook-cephfs
    size: 5Gi
    accessMode: ReadWriteMany
    annotations:
      argocd.argoproj.io/sync-options: Prune=false

logs:
  persistence:
    enabled: true
    storageClassName: rook-cephfs
    size: 5Gi
    annotations:
      argocd.argoproj.io/sync-options: Prune=false

apiServer:
  startupProbe:
    periodSeconds: 10
    timeoutSeconds: 20
    failureThreshold: 30

statsd:
  enabled: true

flower:
  enabled: false
