airflowVersion: "3.2.2"
defaultAirflowTag: "3.2.2"

executor: KubernetesExecutor

createUserJob:
  useHelmHooks: false
  applyCustomEnv: false
  ttlSecondsAfterFinished: null
  defaultUser:
    enabled: true
    username: admin
    email: admin@homelab.xiehang.com

migrateDatabaseJob:
  useHelmHooks: false
  applyCustomEnv: false
  ttlSecondsAfterFinished: null

apiSecretKeySecretName: airflow-api-secret-key
jwtSecretName: airflow-jwt-secret

data:
  metadataConnection:
    user: airflow
    pass: ""        # supplied via metadataSecretName
    protocol: postgresql
    host: postgres-cluster-rw.postgres-cluster.svc
    port: 5432
    db: airflow
    sslmode: disable
  metadataSecretName: airflow-db-credentials

postgresql:
  enabled: false

redis:
  enabled: true
  persistence:
    enabled: true
    storageClassName: rook-ceph-block

dags:
  persistence:
    enabled: true
    storageClassName: rook-cephfs
    size: 5Gi
    accessMode: ReadWriteMany

logs:
  persistence:
    enabled: true
    storageClassName: rook-cephfs
    size: 5Gi

apiServer:
  startupProbe:
    periodSeconds: 10
    timeoutSeconds: 20
    failureThreshold: 30

statsd:
  enabled: false

flower:
  enabled: false

serviceMonitor:
  enabled: true
  additionalLabels:
    release: prometheus-stack
