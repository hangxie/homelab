airflowVersion: "3.2.2"
defaultAirflowTag: "3.2.2"

executor: KubernetesExecutor

createUserJob:
  applyCustomEnv: false
  ttlSecondsAfterFinished: null
  defaultUser:
    enabled: true
    username: admin
    email: admin@homelab.xiehang.com
  # Chart hardcodes the `-p` arg from defaultUser.password. Override args to
  # read the password from the airflow-admin Secret (sourced from Vault).
  env:
    - name: AIRFLOW_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: airflow-admin
          key: password
  args:
    - "bash"
    - "-c"
    - |-
      exec \
      airflow users create "$@"
    - --
    - "-r"
    - "{{ .Values.createUserJob.defaultUser.role }}"
    - "-u"
    - "{{ .Values.createUserJob.defaultUser.username }}"
    - "-e"
    - "{{ .Values.createUserJob.defaultUser.email }}"
    - "-f"
    - "{{ .Values.createUserJob.defaultUser.firstName }}"
    - "-l"
    - "{{ .Values.createUserJob.defaultUser.lastName }}"
    - "-p"
    - "$(AIRFLOW_ADMIN_PASSWORD)"

migrateDatabaseJob:
  applyCustomEnv: false
  ttlSecondsAfterFinished: null

apiSecretKeySecretName: airflow-api-secret-key
jwtSecretName: airflow-jwt-secret
fernetKeySecretName: airflow-fernet-key

data:
  metadataConnection:
    user: airflow
    pass: ""        # supplied via metadataSecretName
    protocol: postgresql
    host: postgres-cluster-rw.postgres-cluster.svc
    port: 5432
    db: airflow
    sslmode: disable
  metadataSecretName: airflow-db-credentials

postgresql:
  enabled: false

redis:
  enabled: true
  persistence:
    enabled: true
    storageClassName: rook-ceph-block

dags:
  persistence:
    enabled: true
    storageClassName: rook-cephfs
    size: 5Gi
    accessMode: ReadWriteMany
    annotations:
      argocd.argoproj.io/sync-options: Prune=false

logs:
  persistence:
    enabled: true
    storageClassName: rook-cephfs
    size: 5Gi
    annotations:
      argocd.argoproj.io/sync-options: Prune=false

apiServer:
  startupProbe:
    periodSeconds: 10
    timeoutSeconds: 20
    failureThreshold: 30

statsd:
  enabled: false

flower:
  enabled: false
