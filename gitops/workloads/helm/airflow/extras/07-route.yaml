apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: airflow
  namespace: airflow
spec:
  parentRefs:
    - name: default-gateway
      namespace: gateway-system
  hostnames:
    - "airflow.homelab.xiehang.com"
  rules:
    - backendRefs:
        - name: wl-airflow-api-server
          port: 8080
