postgresql:
  enabled: false

# Use the cluster-wide Redis (redis-operator) instead of an embedded sub-chart.
# Connection details live under supersetNode.connections below.
redis:
  enabled: false

# The upstream apache/superset image ships without the `postgres` extra, so a
# Postgres metadata DB connection fails at boot with
# `ModuleNotFoundError: No module named 'psycopg2'`. Superset 5.0.0 uses an
# uv-managed venv at /app/.venv, so install into that interpreter explicitly.
bootstrapScript: |
  #!/bin/bash
  set -e
  if [ -x "/app/.venv/bin/python" ] && command -v uv >/dev/null 2>&1; then
    uv pip install --quiet --python /app/.venv/bin/python psycopg2-binary==2.9.10
    /app/.venv/bin/python -c "import psycopg2"
  else
    python -m pip install --quiet psycopg2-binary==2.9.10
    python -c "import psycopg2"
  fi
  if [ ! -f ~/bootstrap ]; then echo "Running Superset with uid $(id -u)" > ~/bootstrap; fi

supersetNode:
  replicas:
    replicaCount: 2
  connections:
    db_host: postgres-cluster-rw.postgres-cluster.svc
    db_port: "5432"
    db_user: superset
    db_name: superset
    # Central redis-operator instance. The -master service follows the master
    # on Sentinel failover (operator re-points its redis-role=master selector).
    redis_host: redis-replication-master.redis.svc
    redis_port: "6379"
    # The chart has no existingSecret hook for the Redis password and only
    # emits password-aware config when this value is truthy. The real password
    # is injected at runtime via the REDIS_PASSWORD entry in extraEnvRaw (an
    # explicit env that overrides the plaintext value the chart bakes into its
    # -env Secret), so this is just a non-secret placeholder flag.
    redis_password: from-extraenvraw

supersetWorker:
  replicas:
    replicaCount: 2

supersetCeleryBeat:
  enabled: true

supersetWebsockets:
  enabled: true
  # The chart's default `jwtSecret: CHANGE-ME` is 9 chars, but the
  # @apache/superset-websocket service requires >=32 bytes and exits at boot
  # otherwise. The chart has no `existingSecret` hook for this Secret, so we
  # inline a value here. TODO: externalize via Vault + ExternalSecret patch.
  config:
    jwtSecret: "6hJgm-mULfdzcq1T-1Vl-3R-jPe194jb"

extraEnvRaw:
  - name: SUPERSET_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: superset-secret
        key: secret-key
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: superset-db-credentials
        key: username
  - name: DB_PASS
    valueFrom:
      secretKeyRef:
        name: superset-db-credentials
        key: password
  - name: SUPERSET_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: superset-admin
        key: password
  # Overrides the placeholder redis_password baked into the chart's -env Secret.
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: superset-redis
        key: password

init:
  loadExamples: false
  adminUser:
    username: admin
    email: admin@homelab.xiehang.com
    password: '"${SUPERSET_ADMIN_PASSWORD}"'
  # `superset fab create-admin` is no-op when the row already exists, so a
  # rotated Vault password never reaches the metadata DB. Append
  # `fab reset-password` so each post-install/post-upgrade hook re-syncs it.
  initscript: |-
    #!/bin/sh
    set -eu
    echo "Upgrading DB schema..."
    superset db upgrade
    echo "Initializing roles..."
    superset init
    {{ if .Values.init.createAdmin }}
    echo "Creating admin user..."
    superset fab create-admin \
                    --username {{ .Values.init.adminUser.username }} \
                    --firstname {{ .Values.init.adminUser.firstname }} \
                    --lastname {{ .Values.init.adminUser.lastname }} \
                    --email {{ .Values.init.adminUser.email }} \
                    --password {{ .Values.init.adminUser.password }} \
                    || true
    echo "Syncing admin password from Vault..."
    superset fab reset-password \
                    --username {{ .Values.init.adminUser.username }} \
                    --password {{ .Values.init.adminUser.password }}
    {{- end }}
    if [ -f "{{ .Values.extraConfigMountPath }}/import_datasources.yaml" ]; then
      echo "Importing database connections.... "
      superset import_datasources -p {{ .Values.extraConfigMountPath }}/import_datasources.yaml
    fi

serviceAccount:
  create: true
