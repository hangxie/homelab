apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: superset-redis
  namespace: superset
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: superset-redis
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: redis/default
        property: password
