apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: superset-admin
  namespace: superset
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: superset-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: superset/admin
        property: password
