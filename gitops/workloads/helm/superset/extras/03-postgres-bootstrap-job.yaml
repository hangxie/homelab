apiVersion: batch/v1
kind: Job
metadata:
  name: superset-postgres-bootstrap
  namespace: superset
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: postgres:18
          env:
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-superuser, key: password } }
            - name: SUPERSET_PASSWORD
              valueFrom: { secretKeyRef: { name: superset-db-credentials, key: password } }
          command: [bash, -ec]
          args:
            - |
              psql -h postgres-cluster-rw.postgres-cluster -U postgres \
                   -v ON_ERROR_STOP=1 \
                   -v SUPERSET_PASSWORD="${SUPERSET_PASSWORD}" <<SQL
              SELECT format('CREATE USER superset WITH PASSWORD %L', :'SUPERSET_PASSWORD')
                WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname='superset')\gexec
              ALTER USER superset WITH PASSWORD :'SUPERSET_PASSWORD';
              SELECT 'CREATE DATABASE superset OWNER superset'
                WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname='superset')\gexec
              GRANT ALL PRIVILEGES ON DATABASE superset TO superset;
              SQL
