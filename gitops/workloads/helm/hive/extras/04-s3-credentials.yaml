# Mirrors Rook's CephObjectStoreUser/hive Secret from rook-ceph into the hive
# namespace, then exposes it through a Stackable SecretClass for S3 credentials.
apiVersion: secrets.stackable.tech/v1alpha2
kind: SecretClass
metadata:
  name: hive-s3
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  backend:
    k8sSearch:
      searchNamespace:
        pod: {}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hive-s3
  namespace: hive
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: rook-ceph-rgw
    kind: ClusterSecretStore
  target:
    name: hive-s3
    creationPolicy: Owner
    template:
      metadata:
        labels:
          secrets.stackable.tech/class: hive-s3
      data:
        accessKey: "{{ .access_key }}"
        secretKey: "{{ .secret_key }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: rook-ceph-object-user-object-store-hive
        property: AccessKey
    - secretKey: secret_key
      remoteRef:
        key: rook-ceph-object-user-object-store-hive
        property: SecretKey
