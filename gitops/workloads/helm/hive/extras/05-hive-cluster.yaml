apiVersion: hive.stackable.tech/v1alpha1
kind: HiveCluster
metadata:
  name: hive-metastore
  namespace: hive
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # The Stackable hive-operator self-registers the HiveCluster CRD at startup
    # (it is not in the Helm chart). On a fresh cluster the CRD does not exist
    # when Argo CD validates this Application, so skip the missing-resource
    # dry-run; sync-wave 1 still applies this CR only after the operator
    # Deployment (wave 0) is healthy and has registered the CRD.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  image:
    productVersion: 4.2.0
  clusterConfig:
    database:
      connString: jdbc:postgresql://postgres-cluster-rw.postgres-cluster.svc:5432/hive
      credentialsSecret: hive-db-credentials
      dbType: postgres
    s3:
      inline:
        host: rook-ceph-rgw-object-store.rook-ceph.svc
        port: 80
        region:
          name: us-east-1
        accessStyle: Path
        credentials:
          secretClass: hive-s3
  metastore:
    config:
      warehouseDir: s3a://hive/warehouse/
    roleConfig:
      listenerClass: cluster-internal
    roleGroups:
      default:
        replicas: 1
