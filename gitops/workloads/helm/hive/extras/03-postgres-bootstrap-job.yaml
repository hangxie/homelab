apiVersion: batch/v1
kind: Job
metadata:
  name: hive-postgres-bootstrap
  namespace: hive
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: postgres:18
          env:
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-superuser, key: password } }
            - name: HIVE_PASSWORD
              valueFrom: { secretKeyRef: { name: hive-db-credentials, key: password } }
          command: [bash, -ec]
          args:
            - |
              psql -h postgres-cluster-rw.postgres-cluster -U postgres \
                   -v ON_ERROR_STOP=1 \
                   -v HIVE_PASSWORD="${HIVE_PASSWORD}" <<SQL
              SELECT format('CREATE USER hive WITH PASSWORD %L', :'HIVE_PASSWORD')
                WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname='hive')\gexec
              ALTER USER hive WITH PASSWORD :'HIVE_PASSWORD';
              SELECT 'CREATE DATABASE hive OWNER hive'
                WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname='hive')\gexec
              GRANT ALL PRIVILEGES ON DATABASE hive TO hive;
              SQL
